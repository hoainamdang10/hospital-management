# Hospital Management System - Prometheus Configuration
# This configuration monitors all microservices and infrastructure components

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "hospital-management-monitor"
    environment: "development"

# Rule files for alerting
rule_files:
  - "rules/*.yml"

# Scrape configurations for all services
scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    scrape_interval: 30s
    metrics_path: /metrics

  # Node Exporter for system metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    scrape_interval: 30s

  # API Gateway
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:3100"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Auth Service
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:3001"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Doctor Service
  - job_name: "doctor-service"
    static_configs:
      - targets: ["doctor-service:3002"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Patient Service
  - job_name: "patient-service"
    static_configs:
      - targets: ["patient-service:3003"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Appointment Service
  - job_name: "appointment-service"
    static_configs:
      - targets: ["appointment-service:3004"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Department Service
  - job_name: "department-service"
    static_configs:
      - targets: ["department-service:3005"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Receptionist Service
  - job_name: "receptionist-service"
    static_configs:
      - targets: ["receptionist-service:3006"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Medical Records Service
  - job_name: "medical-records-service"
    static_configs:
      - targets: ["medical-records-service:3007"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Payment Service
  - job_name: "payment-service"
    static_configs:
      - targets: ["payment-service:3009"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # File Service
  - job_name: "file-service"
    static_configs:
      - targets: ["file-service:3107"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Notification Service
  - job_name: "notification-service"
    static_configs:
      - targets: ["notification-service:3011"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # GraphQL Gateway
  - job_name: "graphql-gateway"
    static_configs:
      - targets: ["graphql-gateway:3200"]
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    metrics_path: /metrics
    scrape_interval: 30s

  # RabbitMQ
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics
    scrape_interval: 30s

  # PostgreSQL (Doctor DB)
  - job_name: "postgres"
    static_configs:
      - targets: ["doctor-db:5432"]
    metrics_path: /metrics
    scrape_interval: 30s
