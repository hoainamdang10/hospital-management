openapi: 3.0.3
info:
  title: Patient Registry Service API
  description: |
    Patient Master Index (PMI) service for centralized patient identity management.
    
    **Features:**
    - Patient registration and profile management
    - Duplicate detection using HL7 FHIR $match algorithm
    - Vietnamese health insurance validation (BHYT/BHTN)
    - Patient linking and merging
    - HIPAA-compliant consent management
    
    **Authentication:**
    All endpoints require JWT token in Authorization header: `Bearer <token>`
    
    **Authorization:**
    - Role-based access control (RBAC)
    - Permission-based access control (PBAC)
    - Resource ownership validation
  version: 2.0.0
  contact:
    name: Hospital Management Team
    email: support@hospital.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3023
    description: Development server
  - url: https://api-staging.hospital.com/patient-registry
    description: Staging server
  - url: https://api.hospital.com/patient-registry
    description: Production server

tags:
  - name: Patients
    description: Patient registration and profile management
  - name: Search
    description: Patient search and matching
  - name: Insurance
    description: Insurance validation
  - name: Health
    description: Service health and monitoring

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Check if service is running
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
                    example: patient-registry-service
                  version:
                    type: string
                    example: 2.0.0

  /api/v1/patients:
    post:
      tags:
        - Patients
      summary: Register new patient
      description: |
        Create a new patient profile. Requires RECEPTIONIST, DOCTOR, or ADMIN role.
        
        **Business Rules:**
        - User ID must exist in Identity Service
        - National ID must be unique
        - BHYT number must be valid format if provided
        - At least one emergency contact required
        - Patient ID generated automatically (PAT-YYYYMM-XXX)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPatientRequest'
      responses:
        '201':
          description: Patient registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Conflict - National ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Search
      summary: Search patients
      description: Search patients by various criteria
      parameters:
        - name: fullName
          in: query
          schema:
            type: string
        - name: nationalId
          in: query
          schema:
            type: string
        - name: phoneNumber
          in: query
          schema:
            type: string
        - name: email
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, merged, deceased]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      patients:
                        type: array
                        items:
                          $ref: '#/components/schemas/PatientSummary'
                      pagination:
                        $ref: '#/components/schemas/Pagination'

  /api/v1/patients/{patientId}:
    get:
      tags:
        - Patients
      summary: Get patient profile
      description: Get detailed patient information by ID
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            pattern: '^PAT-\d{6}-\d{3}$'
            example: PAT-202501-001
      responses:
        '200':
          description: Patient profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Patients
      summary: Update patient information
      description: Update patient profile. Requires patient:update permission.
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientRequest'
      responses:
        '200':
          description: Patient updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'

  /api/v1/patients/{patientId}/deactivate:
    post:
      tags:
        - Patients
      summary: Deactivate patient
      description: Deactivate patient account. Requires ADMIN role.
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for deactivation
                requestedBy:
                  type: string
                  description: User ID requesting deactivation
              required:
                - reason
                - requestedBy
      responses:
        '200':
          description: Patient deactivated successfully

  /api/v1/patients/match:
    post:
      tags:
        - Search
      summary: Match patients (PMI $match)
      description: |
        Find matching patients based on demographic data using HL7 FHIR Patient $match operation.
        
        **Scoring Algorithm:**
        - National ID: 40 points (exact match)
        - Full Name: 20 points (similarity)
        - Date of Birth: 20 points (exact match)
        - Phone: 15 points (exact match)
        - Email: 5 points (exact match)
        
        **Match Grades:**
        - certain: 90-100 points
        - probable: 70-89 points
        - possible: 50-69 points
        - certainly-not: 0-49 points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                dateOfBirth:
                  type: string
                  format: date
                nationalId:
                  type: string
                primaryPhone:
                  type: string
                email:
                  type: string
                onlyCertainMatches:
                  type: boolean
                  default: false
                limit:
                  type: integer
                  default: 10
      responses:
        '200':
          description: Match results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      matches:
                        type: array
                        items:
                          $ref: '#/components/schemas/PatientMatchResult'

  /api/v1/patients/{patientId}/validate-insurance:
    post:
      tags:
        - Insurance
      summary: Validate patient insurance
      description: Validate BHYT or BHTN insurance number
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestedBy:
                  type: string
              required:
                - requestedBy
      responses:
        '200':
          description: Insurance validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuranceValidationResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from Identity Service

  schemas:
    RegisterPatientRequest:
      type: object
      required:
        - userId
        - personalInfo
        - contactInfo
        - emergencyContacts
      properties:
        userId:
          type: string
          description: User ID from Identity Service
        personalInfo:
          $ref: '#/components/schemas/PersonalInfo'
        contactInfo:
          $ref: '#/components/schemas/ContactInfo'
        basicMedicalInfo:
          $ref: '#/components/schemas/BasicMedicalInfo'
        insuranceInfo:
          $ref: '#/components/schemas/InsuranceInfo'
        emergencyContacts:
          type: array
          items:
            $ref: '#/components/schemas/EmergencyContact'
          minItems: 1

    PersonalInfo:
      type: object
      required:
        - fullName
        - dateOfBirth
        - gender
        - nationalId
      properties:
        fullName:
          type: string
          example: Nguyễn Văn A
        dateOfBirth:
          type: string
          format: date
          example: '1990-01-15'
        gender:
          type: string
          enum: [male, female, other]
        nationalId:
          type: string
          pattern: '^\d{9}$|^\d{12}$'
          example: '001234567890'
        ethnicity:
          type: string
          example: Kinh
        nationality:
          type: string
          example: Vietnamese
        occupation:
          type: string
          example: Software Engineer
        maritalStatus:
          type: string
          enum: [single, married, divorced, widowed]

    ContactInfo:
      type: object
      required:
        - primaryPhone
        - address
      properties:
        primaryPhone:
          type: string
          pattern: '^(0|\+84)[0-9]{9}$'
          example: '0912345678'
        secondaryPhone:
          type: string
        email:
          type: string
          format: email
        address:
          type: object
          required:
            - street
            - ward
            - district
            - city
          properties:
            street:
              type: string
            ward:
              type: string
            district:
              type: string
            city:
              type: string
            postalCode:
              type: string

    BasicMedicalInfo:
      type: object
      properties:
        bloodType:
          type: string
          enum: [A+, A-, B+, B-, AB+, AB-, O+, O-]
        allergies:
          type: array
          items:
            type: string
        chronicConditions:
          type: array
          items:
            type: string
        currentMedications:
          type: array
          items:
            type: string

    InsuranceInfo:
      type: object
      required:
        - provider
        - policyNumber
        - coverageType
        - validFrom
        - validTo
      properties:
        provider:
          type: string
          example: BHXH Việt Nam
        policyNumber:
          type: string
          example: HN-1-01-2024-12345-67890
        coverageType:
          type: string
          enum: [BHYT, BHTN, private]
        validFrom:
          type: string
          format: date
        validTo:
          type: string
          format: date
        isActive:
          type: boolean
          default: true

    EmergencyContact:
      type: object
      required:
        - fullName
        - relationship
        - phoneNumber
      properties:
        fullName:
          type: string
        relationship:
          type: string
          example: Vợ/chồng
        phoneNumber:
          type: string
        address:
          type: string
        isPrimary:
          type: boolean
          default: false

    UpdatePatientRequest:
      type: object
      properties:
        personalInfo:
          $ref: '#/components/schemas/PersonalInfo'
        contactInfo:
          $ref: '#/components/schemas/ContactInfo'
        basicMedicalInfo:
          $ref: '#/components/schemas/BasicMedicalInfo'
        insuranceInfo:
          $ref: '#/components/schemas/InsuranceInfo'
        requestedBy:
          type: string

    PatientResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            patientId:
              type: string
              example: PAT-202501-001
            userId:
              type: string
            personalInfo:
              $ref: '#/components/schemas/PersonalInfo'
            contactInfo:
              $ref: '#/components/schemas/ContactInfo'
            basicMedicalInfo:
              $ref: '#/components/schemas/BasicMedicalInfo'
            insuranceInfo:
              $ref: '#/components/schemas/InsuranceInfo'
            emergencyContacts:
              type: array
              items:
                $ref: '#/components/schemas/EmergencyContact'
            status:
              type: string
              enum: [active, inactive, merged, deceased]
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    PatientSummary:
      type: object
      properties:
        patientId:
          type: string
        fullName:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
        nationalId:
          type: string
        primaryPhone:
          type: string
        status:
          type: string

    PatientMatchResult:
      type: object
      properties:
        patient:
          $ref: '#/components/schemas/PatientSummary'
        matchGrade:
          type: string
          enum: [certain, probable, possible, certainly-not]
        score:
          type: integer
          minimum: 0
          maximum: 100
        matchDetails:
          type: object
          properties:
            matchedFields:
              type: array
              items:
                type: string
            scores:
              type: object
              additionalProperties:
                type: number

    InsuranceValidationResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            patientId:
              type: string
            hasInsurance:
              type: boolean
            insuranceInfo:
              type: object
            validationResult:
              type: object
              properties:
                isValid:
                  type: boolean
                reasons:
                  type: array
                  items:
                    type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Bad request - Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Unauthorized:
      description: Unauthorized - Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    NotFound:
      description: Not found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

