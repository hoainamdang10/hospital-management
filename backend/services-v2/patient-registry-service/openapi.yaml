openapi: 3.0.3
info:
  title: Patient Registry Service API
  description: |
    Patient Master Index (PMI) service for centralized patient identity management.
    
    **Features:**
    - Patient registration and profile management
    - Duplicate detection using HL7 FHIR $match algorithm
    - Vietnamese health insurance validation (BHYT/BHTN)
    - Patient linking and merging
    - HIPAA-compliant consent management
    
    **Authentication:**
    All endpoints require JWT token in Authorization header: `Bearer <token>`
    
    **Authorization:**
    - Role-based access control (RBAC)
    - Permission-based access control (PBAC)
    - Resource ownership validation
  version: 2.0.0
  contact:
    name: Hospital Management Team
    email: support@hospital.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3023
    description: Development server
  - url: https://api-staging.hospital.com/patient-registry
    description: Staging server
  - url: https://api.hospital.com/patient-registry
    description: Production server

tags:
  - name: Patients
    description: Patient registration and profile management
  - name: Emergency Contacts
    description: Emergency contact management
  - name: Consents
    description: Patient consent management (HIPAA compliance)
  - name: Insurance
    description: Insurance information and validation
  - name: Search
    description: Patient search and matching
  - name: Health
    description: Service health and monitoring

security:
  - BearerAuth: []

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Check if service is running
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
                    example: patient-registry-service
                  version:
                    type: string
                    example: 2.0.0

  /api/v1/patients:
    post:
      tags:
        - Patients
      summary: Register new patient
      description: |
        Create a new patient profile. Requires RECEPTIONIST, DOCTOR, or ADMIN role.
        
        **Business Rules:**
        - User ID must exist in Identity Service
        - National ID must be unique
        - BHYT number must be valid format if provided
        - At least one emergency contact required
        - Patient ID generated automatically (PAT-YYYYMM-XXX)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterPatientRequest'
      responses:
        '201':
          description: Patient registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Conflict - National ID already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags:
        - Search
      summary: Search patients
      description: Search patients by various criteria
      parameters:
        - name: fullName
          in: query
          schema:
            type: string
        - name: nationalId
          in: query
          schema:
            type: string
        - name: phoneNumber
          in: query
          schema:
            type: string
        - name: email
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, merged, deceased]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      patients:
                        type: array
                        items:
                          $ref: '#/components/schemas/PatientSummary'
                      pagination:
                        $ref: '#/components/schemas/Pagination'

  /api/v1/patients/user/{userId}:
    get:
      tags:
        - Patients
      summary: Get patient by user ID
      description: Retrieve patient profile by Identity Service user ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Patient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/patients/national-id/{nationalId}:
    get:
      tags:
        - Patients
      summary: Get patient by national ID
      description: Retrieve patient profile by Vietnamese national ID (CCCD/CMND)
      parameters:
        - name: nationalId
          in: path
          required: true
          schema:
            type: string
            pattern: '^\d{9}$|^\d{12}$'
      responses:
        '200':
          description: Patient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/patients/bhyt/{bhytNumber}:
    get:
      tags:
        - Patients
      summary: Get patient by BHYT number
      description: Retrieve patient profile by Vietnamese health insurance number
      parameters:
        - name: bhytNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Patient found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/patients/search:
    get:
      tags:
        - Search
      summary: Search patients
      description: Search patients by name, national ID, or phone number
      parameters:
        - name: searchTerm
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      patients:
                        type: array
                        items:
                          $ref: '#/components/schemas/PatientSummary'
                      pagination:
                        $ref: '#/components/schemas/Pagination'

  /api/v1/patients/{patientId}:
    get:
      tags:
        - Patients
      summary: Get patient profile
      description: Get detailed patient information by ID
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
            pattern: '^PAT-\d{6}-\d{3}$'
            example: PAT-202501-001
      responses:
        '200':
          description: Patient profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Patients
      summary: Update patient information
      description: Update patient profile. Requires patient:update permission.
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePatientRequest'
      responses:
        '200':
          description: Patient updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientResponse'

  /api/v1/patients/{patientId}/link:
    post:
      tags:
        - Patients
      summary: Link patients
      description: Create a link between two patient records (e.g., same person, see-also)
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetPatientId:
                  type: string
                linkType:
                  type: string
                  enum: [replaces, replaced-by, refer, seealso]
                performedBy:
                  type: string
              required:
                - targetPatientId
                - linkType
                - performedBy
      responses:
        '200':
          description: Patients linked successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/patients/{patientId}/deactivate:
    post:
      tags:
        - Patients
      summary: Deactivate patient
      description: Deactivate patient account. Requires ADMIN role.
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Reason for deactivation
                requestedBy:
                  type: string
                  description: User ID requesting deactivation
              required:
                - reason
                - requestedBy
      responses:
        '200':
          description: Patient deactivated successfully

  /api/v1/patients/merge:
    post:
      tags:
        - Patients
      summary: Merge patients
      description: Merge duplicate patient records into a single master record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourcePatientId:
                  type: string
                targetPatientId:
                  type: string
                performedBy:
                  type: string
              required:
                - sourcePatientId
                - targetPatientId
                - performedBy
      responses:
        '200':
          description: Patients merged successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/patients/match:
    post:
      tags:
        - Search
      summary: Match patients (PMI $match)
      description: |
        Find matching patients based on demographic data using HL7 FHIR Patient $match operation.
        
        **Scoring Algorithm:**
        - National ID: 40 points (exact match)
        - Full Name: 20 points (similarity)
        - Date of Birth: 20 points (exact match)
        - Phone: 15 points (exact match)
        - Email: 5 points (exact match)
        
        **Match Grades:**
        - certain: 90-100 points
        - probable: 70-89 points
        - possible: 50-69 points
        - certainly-not: 0-49 points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                dateOfBirth:
                  type: string
                  format: date
                nationalId:
                  type: string
                primaryPhone:
                  type: string
                email:
                  type: string
                onlyCertainMatches:
                  type: boolean
                  default: false
                limit:
                  type: integer
                  default: 10
      responses:
        '200':
          description: Match results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      matches:
                        type: array
                        items:
                          $ref: '#/components/schemas/PatientMatchResult'

  /api/v1/patients/{patientId}/validate-insurance:
    post:
      tags:
        - Insurance
      summary: Validate patient insurance
      description: Validate BHYT or BHTN insurance number
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestedBy:
                  type: string
              required:
                - requestedBy
      responses:
        '200':
          description: Insurance validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsuranceValidationResponse'

  /api/v1/patients/{patientId}/reactivate:
    post:
      tags:
        - Patients
      summary: Reactivate patient
      description: Reactivate a deactivated patient account
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                performedBy:
                  type: string
              required:
                - performedBy
      responses:
        '200':
          description: Patient reactivated successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/patients/{patientId}/mark-deceased:
    post:
      tags:
        - Patients
      summary: Mark patient as deceased
      description: Mark a patient as deceased with date and cause
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deceasedDate:
                  type: string
                  format: date
                causeOfDeath:
                  type: string
                performedBy:
                  type: string
              required:
                - deceasedDate
                - performedBy
      responses:
        '200':
          description: Patient marked as deceased successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  # Emergency Contacts Endpoints
  /api/v1/patients/{patientId}/emergency-contacts:
    get:
      tags:
        - Emergency Contacts
      summary: Get all emergency contacts
      description: Retrieve all emergency contacts for a patient
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
          description: Patient ID (PAT-YYYYMM-XXX)
      responses:
        '200':
          description: Emergency contacts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      patientId:
                        type: string
                      contacts:
                        type: array
                        items:
                          $ref: '#/components/schemas/EmergencyContactResponse'
                      totalCount:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - Emergency Contacts
      summary: Add emergency contact
      description: Add a new emergency contact for a patient
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddEmergencyContactRequest'
      responses:
        '201':
          description: Emergency contact added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/patients/{patientId}/emergency-contacts/{contactId}:
    put:
      tags:
        - Emergency Contacts
      summary: Update emergency contact
      description: Update an existing emergency contact
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmergencyContactRequest'
      responses:
        '200':
          description: Emergency contact updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Emergency Contacts
      summary: Remove emergency contact
      description: Remove an emergency contact from patient
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                performedBy:
                  type: string
              required:
                - performedBy
      responses:
        '200':
          description: Emergency contact removed successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/patients/{patientId}/emergency-contacts/{contactId}/set-primary:
    put:
      tags:
        - Emergency Contacts
      summary: Set primary emergency contact
      description: Set an emergency contact as primary
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
        - name: contactId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                performedBy:
                  type: string
              required:
                - performedBy
      responses:
        '200':
          description: Primary contact set successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # Consents Endpoints
  /api/v1/patients/{patientId}/consents:
    get:
      tags:
        - Consents
      summary: Get all consents
      description: Retrieve all consents for a patient (HIPAA compliance)
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Consents retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      patientId:
                        type: string
                      consents:
                        type: array
                        items:
                          $ref: '#/components/schemas/ConsentResponse'
                      totalCount:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - Consents
      summary: Grant consent
      description: Grant a new consent for patient data usage
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GrantConsentRequest'
      responses:
        '201':
          description: Consent granted successfully
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/patients/{patientId}/consents/active:
    get:
      tags:
        - Consents
      summary: Get active consents only
      description: Retrieve only active (valid) consents for a patient
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active consents retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      patientId:
                        type: string
                      activeConsents:
                        type: array
                        items:
                          $ref: '#/components/schemas/ConsentResponse'
                      totalCount:
                        type: integer
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/patients/{patientId}/consents/{consentId}:
    get:
      tags:
        - Consents
      summary: Get consent details
      description: Retrieve detailed information about a specific consent
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
        - name: consentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Consent details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ConsentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/patients/{patientId}/consents/{consentId}/revoke:
    post:
      tags:
        - Consents
      summary: Revoke consent
      description: Revoke a previously granted consent
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
        - name: consentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                performedBy:
                  type: string
              required:
                - performedBy
      responses:
        '200':
          description: Consent revoked successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  # Insurance Info Endpoints
  /api/v1/patients/{patientId}/insurance:
    get:
      tags:
        - Insurance
      summary: Get insurance information
      description: Retrieve insurance information for a patient
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Insurance info retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/InsuranceInfoResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Insurance
      summary: Update insurance information
      description: Update patient insurance information (only isActive and isPrimary fields)
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInsuranceInfoRequest'
      responses:
        '200':
          description: Insurance info updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/patients/{patientId}/insurance/verify:
    post:
      tags:
        - Insurance
      summary: Verify insurance with external system
      description: Verify insurance validity with BHYT/BHTN external system
      parameters:
        - name: patientId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                requestedBy:
                  type: string
              required:
                - requestedBy
      responses:
        '200':
          description: Insurance verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      isValid:
                        type: boolean
                      coverageType:
                        type: string
                      validFrom:
                        type: string
                        format: date
                      validTo:
                        type: string
                        format: date
                      provider:
                        type: string
                      verificationStatus:
                        type: string
                        enum: [verified, expired, invalid, not_found]
                      verifiedAt:
                        type: string
                        format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token from Identity Service

  schemas:
    RegisterPatientRequest:
      type: object
      required:
        - userId
        - personalInfo
        - contactInfo
        - emergencyContacts
      properties:
        userId:
          type: string
          description: User ID from Identity Service
        personalInfo:
          $ref: '#/components/schemas/PersonalInfo'
        contactInfo:
          $ref: '#/components/schemas/ContactInfo'
        basicMedicalInfo:
          $ref: '#/components/schemas/BasicMedicalInfo'
        insuranceInfo:
          $ref: '#/components/schemas/InsuranceInfo'
        emergencyContacts:
          type: array
          items:
            $ref: '#/components/schemas/EmergencyContact'
          minItems: 1

    PersonalInfo:
      type: object
      required:
        - fullName
        - dateOfBirth
        - gender
        - nationalId
      properties:
        fullName:
          type: string
          example: Nguyễn Văn A
        dateOfBirth:
          type: string
          format: date
          example: '1990-01-15'
        gender:
          type: string
          enum: [male, female, other]
        nationalId:
          type: string
          pattern: '^\d{9}$|^\d{12}$'
          example: '001234567890'
        ethnicity:
          type: string
          example: Kinh
        nationality:
          type: string
          example: Vietnamese
        occupation:
          type: string
          example: Software Engineer
        maritalStatus:
          type: string
          enum: [single, married, divorced, widowed]

    ContactInfo:
      type: object
      required:
        - primaryPhone
        - address
      properties:
        primaryPhone:
          type: string
          pattern: '^(0|\+84)[0-9]{9}$'
          example: '0912345678'
        secondaryPhone:
          type: string
        email:
          type: string
          format: email
        address:
          type: object
          required:
            - street
            - ward
            - district
            - city
          properties:
            street:
              type: string
            ward:
              type: string
            district:
              type: string
            city:
              type: string
            postalCode:
              type: string

    BasicMedicalInfo:
      type: object
      properties:
        bloodType:
          type: string
          enum: [A+, A-, B+, B-, AB+, AB-, O+, O-]
        allergies:
          type: array
          items:
            type: string
        chronicConditions:
          type: array
          items:
            type: string
        currentMedications:
          type: array
          items:
            type: string

    InsuranceInfo:
      type: object
      required:
        - provider
        - policyNumber
        - coverageType
        - validFrom
        - validTo
      properties:
        provider:
          type: string
          example: BHXH Việt Nam
        policyNumber:
          type: string
          example: HN-1-01-2024-12345-67890
        coverageType:
          type: string
          enum: [BHYT, BHTN, private]
        validFrom:
          type: string
          format: date
        validTo:
          type: string
          format: date
        isActive:
          type: boolean
          default: true

    EmergencyContact:
      type: object
      required:
        - fullName
        - relationship
        - phoneNumber
      properties:
        fullName:
          type: string
        relationship:
          type: string
          example: Vợ/chồng
        phoneNumber:
          type: string
        address:
          type: string
        isPrimary:
          type: boolean
          default: false

    UpdatePatientRequest:
      type: object
      properties:
        personalInfo:
          $ref: '#/components/schemas/PersonalInfo'
        contactInfo:
          $ref: '#/components/schemas/ContactInfo'
        basicMedicalInfo:
          $ref: '#/components/schemas/BasicMedicalInfo'
        insuranceInfo:
          $ref: '#/components/schemas/InsuranceInfo'
        requestedBy:
          type: string

    PatientResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            patientId:
              type: string
              example: PAT-202501-001
            userId:
              type: string
            personalInfo:
              $ref: '#/components/schemas/PersonalInfo'
            contactInfo:
              $ref: '#/components/schemas/ContactInfo'
            basicMedicalInfo:
              $ref: '#/components/schemas/BasicMedicalInfo'
            insuranceInfo:
              $ref: '#/components/schemas/InsuranceInfo'
            emergencyContacts:
              type: array
              items:
                $ref: '#/components/schemas/EmergencyContact'
            status:
              type: string
              enum: [active, inactive, merged, deceased]
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    PatientSummary:
      type: object
      properties:
        patientId:
          type: string
        fullName:
          type: string
        dateOfBirth:
          type: string
          format: date
        gender:
          type: string
        nationalId:
          type: string
        primaryPhone:
          type: string
        status:
          type: string

    PatientMatchResult:
      type: object
      properties:
        patient:
          $ref: '#/components/schemas/PatientSummary'
        matchGrade:
          type: string
          enum: [certain, probable, possible, certainly-not]
        score:
          type: integer
          minimum: 0
          maximum: 100
        matchDetails:
          type: object
          properties:
            matchedFields:
              type: array
              items:
                type: string
            scores:
              type: object
              additionalProperties:
                type: number

    InsuranceValidationResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            patientId:
              type: string
            hasInsurance:
              type: boolean
            insuranceInfo:
              type: object
            validationResult:
              type: object
              properties:
                isValid:
                  type: boolean
                reasons:
                  type: array
                  items:
                    type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer

    # Emergency Contacts Schemas
    EmergencyContactResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        relationship:
          type: string
        phone:
          type: string
        alternatePhone:
          type: string
        address:
          type: string
        isPrimary:
          type: boolean
        notes:
          type: string

    AddEmergencyContactRequest:
      type: object
      required:
        - name
        - relationship
        - phone
        - performedBy
      properties:
        name:
          type: string
        relationship:
          type: string
        phone:
          type: string
        alternatePhone:
          type: string
        address:
          type: string
        notes:
          type: string
        performedBy:
          type: string

    UpdateEmergencyContactRequest:
      type: object
      required:
        - performedBy
      properties:
        name:
          type: string
        relationship:
          type: string
        phone:
          type: string
        alternatePhone:
          type: string
        address:
          type: string
        notes:
          type: string
        performedBy:
          type: string

    # Consents Schemas
    ConsentResponse:
      type: object
      properties:
        id:
          type: string
        consentType:
          type: string
          enum: [treatment, research, data_sharing, marketing]
        witnessedBy:
          type: string
        expiryDate:
          type: string
          format: date
        notes:
          type: string
        isActive:
          type: boolean
        grantedAt:
          type: string
          format: date-time
        withdrawnAt:
          type: string
          format: date-time
        isExpired:
          type: boolean
        isValid:
          type: boolean
        daysUntilExpiry:
          type: integer

    GrantConsentRequest:
      type: object
      required:
        - consentType
        - witnessedBy
        - performedBy
      properties:
        consentType:
          type: string
          enum: [treatment, research, data_sharing, marketing]
        witnessedBy:
          type: string
        expiryDate:
          type: string
          format: date
        notes:
          type: string
        performedBy:
          type: string

    # Insurance Schemas
    InsuranceInfoResponse:
      type: object
      properties:
        provider:
          type: string
        policyNumber:
          type: string
        groupNumber:
          type: string
        validFrom:
          type: string
          format: date
        validTo:
          type: string
          format: date
        coverageType:
          type: string
          enum: [BHYT, BHTN, private, self_pay]
        isActive:
          type: boolean
        isPrimary:
          type: boolean
        isVietnameseInsurance:
          type: boolean
        bhytNumber:
          type: string

    UpdateInsuranceInfoRequest:
      type: object
      required:
        - performedBy
      properties:
        isActive:
          type: boolean
        isPrimary:
          type: boolean
        performedBy:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Bad request - Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Unauthorized:
      description: Unauthorized - Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    
    NotFound:
      description: Not found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

