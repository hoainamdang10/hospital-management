services:
  # ============================================
  # Identity Service
  # ============================================
  identity-service:
    build:
      context: ..
      dockerfile: identity-service/Dockerfile
      args:
        NODE_ENV: production
        BUILD_DATE: ${BUILD_DATE:-2025-01-01T00:00:00Z}
        VERSION: ${VERSION:-2.0.0}
        VCS_REF: ${VCS_REF:-dev}
    image: identity-service:${VERSION:-latest}
    container_name: identity-service
    restart: unless-stopped
    ports:
      - "${IDENTITY_SERVICE_PORT:-3001}:3001"
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      SERVICE_NAME: identity-service
      SERVICE_VERSION: ${VERSION:-2.0.0}

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}

      # Redis
      REDIS_URL: redis://redis-v2:6379
      REDIS_HOST: redis-v2
      REDIS_PORT: 6379

      # RabbitMQ
      RABBITMQ_URL: amqp://admin:admin@rabbitmq-v2:5672
      RABBITMQ_HOST: rabbitmq-v2
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASSWORD: admin

      # Email (SendGrid)
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Hospital Management System}

      # Frontend
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3101}

      # Monitoring
      LOG_LEVEL: ${LOG_LEVEL:-info}
      INTERNAL_SERVICE_TOKENS: ${INTERNAL_SERVICE_TOKENS:-dev-internal-token}
    depends_on: {}
    networks:
      - hospital-v2-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - identity-logs:/app/identity-service/logs
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

# ============================================
# Networks
# ============================================
networks:
  hospital-v2-network:
    external: true
    name: services-v2_hospital-v2-network

# ============================================
# Volumes
# ============================================
volumes:
  identity-logs:
    name: identity-logs
