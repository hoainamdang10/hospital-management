openapi: 3.1.0
info:
  title: Identity Service API
  version: 2.0.0
  description: Authentication and authorization service for Hospital Management System V2
  contact:
    name: Hospital Management Team
  license:
    name: MIT

servers:
  - url: http://localhost:3021
    description: Development server

tags:
  - name: Health Check
    description: Service health, monitoring, and metrics
  - name: Authentication
    description: Login, registration, and session management
  - name: User Management
    description: User CRUD operations and profile management
  - name: MFA
    description: Multi-factor authentication
  - name: Session Management
    description: Active session tracking and termination
  - name: Password Policy
    description: Password validation and policy management
  - name: Account Recovery
    description: Password reset and recovery methods
  - name: Permission Check
    description: Role and permission validation
  - name: Staff Management
    description: Staff invitation and provisioning
  - name: Admin Operations
    description: Administrative and maintenance operations

security:
  - BearerAuth: []

paths:
  # Health Check
  /health:
    get:
      tags: [Health Check]
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  overall:
                    type: string
                    enum: [HEALTHY, DEGRADED, UNHEALTHY]
                  services:
                    type: object
                  timestamp:
                    type: string
                    format: date-time
        '503':
          description: Service Unavailable

  /info:
    get:
      tags: [Health Check]
      summary: Service information
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                  version:
                    type: string
                  environment:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                  mode:
                    type: string

  /circuit-breakers:
    get:
      tags: [Health Check]
      summary: Circuit breaker status
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  breakers:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        state:
                          type: string
                          enum: [CLOSED, OPEN, HALF_OPEN]
                        failureCount:
                          type: number
                        lastFailureTime:
                          type: string
                          format: date-time

  /metrics:
    get:
      tags: [Health Check]
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string

  # Authentication
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register patient
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, fullName]
              properties:
                email: {type: string, format: email}
                password: {type: string, minLength: 8}
                fullName: {type: string}
                phoneNumber: {type: string}
                citizenId: {type: string}
                dateOfBirth: {type: string, format: date}
                gender: {type: string, enum: [male, female, other]}
                address: {type: string}
      responses:
        '201':
          description: Created

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string}
                password: {type: string}
                mfaCode: {type: string}
      responses:
        '200':
          description: OK

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout
      responses:
        '200':
          description: OK

  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: {type: string}
      responses:
        '200':
          description: OK

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user from session
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      userId:
                        type: string
                        format: uuid
                      email:
                        type: string
                        format: email
                      username:
                        type: string
                      fullName:
                        type: string
                      role:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                      permissions:
                        type: array
                        items:
                          type: string
                      isActive:
                        type: boolean
                      isEmailVerified:
                        type: boolean
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time

  /auth/validate-invitation:
    get:
      tags: [Authentication]
      summary: Validate staff invitation token
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Staff invitation token
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  isValid:
                    type: boolean
                  invitationData:
                    type: object
                    properties:
                      email:
                        type: string
                        format: email
                      fullName:
                        type: string
                      role:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
        '400':
          description: Bad Request

  /auth/forgot-password:
    post:
      tags: [Authentication]
      summary: Forgot password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: {type: string}
      responses:
        '200':
          description: OK

  /auth/reset-password:
    post:
      tags: [Authentication]
      summary: Reset password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accessToken, refreshToken, newPassword]
              properties:
                accessToken: {type: string}
                refreshToken: {type: string}
                newPassword: {type: string}
      responses:
        '200':
          description: OK

  /auth/verify-email:
    post:
      tags: [Authentication]
      summary: Verify email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  message: {type: string}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

  /auth/resend-verification:
    post:
      tags: [Authentication]
      summary: Resend email verification
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: {type: string, format: email}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  message: {type: string}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

  # User Management
  /api/v1/users/me:
    get:
      tags: [User Management]
      summary: Get current user
      responses:
        '200':
          description: OK

  /api/v1/users/{userId}:
    get:
      tags: [User Management]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
    patch:
      tags: [User Management]
      summary: Update user (partial)
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName: {type: string}
                phoneNumber: {type: string}
                address: {type: string}
      responses:
        '200':
          description: OK
    put:
      tags: [User Management]
      summary: Update user (complete replacement)
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, email]
              properties:
                fullName: {type: string}
                email: {type: string, format: email}
                phoneNumber: {type: string}
                address: {type: string}
                dateOfBirth: {type: string, format: date}
                gender: {type: string, enum: [male, female, other]}
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request - Missing required fields for complete replacement
    delete:
      tags: [User Management]
      summary: Delete user (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/users:
    get:
      tags: [User Management]
      summary: List users (admin only)
      parameters:
        - name: page
          in: query
          schema: {type: integer, default: 1}
        - name: limit
          in: query
          schema: {type: integer, default: 20}
        - name: roleType
          in: query
          schema: {type: string}
        - name: isActive
          in: query
          schema: {type: boolean}
      responses:
        '200':
          description: OK

  /api/v1/users/{userId}/change-password:
    post:
      tags: [User Management]
      summary: Change password
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: {type: string}
                newPassword: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/users/{userId}/lock:
    post:
      tags: [User Management]
      summary: Lock account (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: {type: string}
                terminateSessions: {type: boolean, default: true}
      responses:
        '200':
          description: OK

  /api/v1/users/{userId}/unlock:
    post:
      tags: [User Management]
      summary: Unlock account (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/users/{userId}/assign-role:
    post:
      tags: [User Management]
      summary: Assign role (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleType]
              properties:
                roleType: {type: string, enum: [admin, doctor, nurse, receptionist, patient]}
                reason: {type: string}
      responses:
        '200':
          description: OK

  # MFA
  /auth/mfa/enable:
    post:
      tags: [MFA]
      summary: Enable MFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method: {type: string, enum: [totp, sms, email]}
      responses:
        '200':
          description: OK

  /auth/mfa/verify:
    post:
      tags: [MFA]
      summary: Verify MFA code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: {type: string}
      responses:
        '200':
          description: OK

  /auth/mfa/disable:
    post:
      tags: [MFA]
      summary: Disable MFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: {type: string}
      responses:
        '200':
          description: OK

  # Session Management
  /api/v1/users/{userId}/sessions:
    get:
      tags: [Session Management]
      summary: List active sessions
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK
    delete:
      tags: [Session Management]
      summary: Terminate all sessions
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                exceptCurrent: {type: boolean, default: true}
      responses:
        '200':
          description: OK

  /api/v1/users/{userId}/sessions/{sessionId}:
    delete:
      tags: [Session Management]
      summary: Terminate session
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
        - name: sessionId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK

  # Password Policy
  /api/v1/password-policy:
    get:
      tags: [Password Policy]
      summary: Get password policy
      security: []
      responses:
        '200':
          description: OK
    put:
      tags: [Password Policy]
      summary: Update password policy (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                minLength: {type: integer}
                requireUppercase: {type: boolean}
                requireLowercase: {type: boolean}
                requireNumbers: {type: boolean}
                requireSpecialChars: {type: boolean}
      responses:
        '200':
          description: OK

  /api/v1/password-policy/validate:
    post:
      tags: [Password Policy]
      summary: Validate password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password: {type: string}
      responses:
        '200':
          description: OK

  # Account Recovery
  /api/v1/account-recovery/methods:
    get:
      tags: [Account Recovery]
      summary: Get recovery methods
      responses:
        '200':
          description: OK
    put:
      tags: [Account Recovery]
      summary: Update recovery methods
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recoveryEmail: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/account-recovery/request-reset:
    post:
      tags: [Account Recovery]
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: {type: string}
                method: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/account-recovery/verify-token:
    post:
      tags: [Account Recovery]
      summary: Verify reset token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/account-recovery/reset-password:
    post:
      tags: [Account Recovery]
      summary: Reset password with token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword, confirmPassword]
              properties:
                token: {type: string}
                newPassword: {type: string}
                confirmPassword: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/account-recovery/history:
    get:
      tags: [Account Recovery]
      summary: Get recovery history
      parameters:
        - name: page
          in: query
          schema: {type: integer}
        - name: pageSize
          in: query
          schema: {type: integer}
      responses:
        '200':
          description: OK

  # Permission Check
  /api/v1/permissions/{userId}:
    get:
      tags: [Permission Check]
      summary: Get user permissions
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/auth/check-permission:
    post:
      tags: [Permission Check]
      summary: Check permission
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, permission]
              properties:
                userId: {type: string}
                permission: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/auth/check-permissions:
    post:
      tags: [Permission Check]
      summary: Check multiple permissions
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, permissions]
              properties:
                userId: {type: string}
                permissions: {type: array, items: {type: string}}
                requireAll: {type: boolean, default: true}
      responses:
        '200':
          description: OK

  /api/v1/auth/check-role:
    post:
      tags: [Permission Check]
      summary: Check role
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId: {type: string}
                role: {type: string}
      responses:
        '200':
          description: OK

  /api/v1/auth/check-roles:
    post:
      tags: [Permission Check]
      summary: Check multiple roles
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, roles]
              properties:
                userId: {type: string}
                roles: {type: array, items: {type: string}}
                requireAll: {type: boolean, default: false}
      responses:
        '200':
          description: OK

  # Staff Management
  /admin/staff/register:
    post:
      tags: [Staff Management]
      summary: Provision staff account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, fullName, roleType]
              properties:
                email: {type: string}
                fullName: {type: string}
                roleType: {type: string, enum: [admin, doctor, nurse, receptionist]}
                phoneNumber: {type: string}
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  invitationUrl: {type: string}
                  expiresAt: {type: string, format: date-time}
                  message: {type: string}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

  /admin/staff/invitations:
    get:
      tags: [Staff Management]
      summary: List staff invitations (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: Page number
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
          description: Items per page
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, ACCEPTED, EXPIRED, CANCELLED]
          description: Filter by status
        - name: role
          in: query
          schema:
            type: string
            enum: [ADMIN, DOCTOR, NURSE, RECEPTIONIST]
          description: Filter by role
        - name: email
          in: query
          schema:
            type: string
          description: Search by email (partial match)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  invitations:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: string, format: uuid}
                        email: {type: string}
                        role: {type: string}
                        invitedBy: {type: string, format: uuid}
                        status: {type: string}
                        expiresAt: {type: string, format: date-time}
                        isExpired: {type: boolean}
                        invitationData: {type: object}
                        createdAt: {type: string, format: date-time}
                        updatedAt: {type: string, format: date-time}
                  total: {type: integer}
                  page: {type: integer}
                  limit: {type: integer}
                  totalPages: {type: integer}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

  /admin/staff/invitations/{id}:
    get:
      tags: [Staff Management]
      summary: Get staff invitation details (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Invitation ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  invitation:
                    type: object
                    properties:
                      id: {type: string, format: uuid}
                      email: {type: string}
                      role: {type: string}
                      invitedBy: {type: string, format: uuid}
                      invitationToken: {type: string}
                      expiresAt: {type: string, format: date-time}
                      acceptedAt: {type: string, format: date-time}
                      acceptedBy: {type: string, format: uuid}
                      status: {type: string}
                      isExpired: {type: boolean}
                      invitationData: {type: object}
                      createdAt: {type: string, format: date-time}
                      updatedAt: {type: string, format: date-time}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

    delete:
      tags: [Staff Management]
      summary: Cancel staff invitation (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Invitation ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: {type: string}
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  message: {type: string}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

  /admin/staff/invitations/{id}/resend:
    post:
      tags: [Staff Management]
      summary: Resend staff invitation (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Invitation ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  invitationUrl: {type: string}
                  expiresAt: {type: string, format: date-time}
                  message: {type: string}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

  /auth/activate-staff:
    post:
      tags: [Staff Management]
      summary: Accept staff invitation
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [invitationToken, password, confirmPassword]
              properties:
                invitationToken: {type: string}
                password: {type: string}
                confirmPassword: {type: string}
                fullName: {type: string}
                phoneNumber: {type: string}
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  user:
                    type: object
                    properties:
                      id: {type: string, format: uuid}
                      email: {type: string}
                      role: {type: string}
                  accessToken: {type: string}
                  refreshToken: {type: string}
                  message: {type: string}
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

  # Admin Operations
  /admin/recovery:
    post:
      tags: [Admin Operations]
      summary: Force service recovery (admin only)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  message: {type: string}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: {type: string}

  /admin/permissions/invalidate/{userId}:
    post:
      tags: [Admin Operations]
      summary: Invalidate user permission cache (admin only)
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: User ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  message: {type: string}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

  /admin/permissions/invalidate-role/{roleType}:
    post:
      tags: [Admin Operations]
      summary: Invalidate permission cache for all users with a role (admin only)
      parameters:
        - name: roleType
          in: path
          required: true
          schema:
            type: string
            enum: [ADMIN, DOCTOR, NURSE, RECEPTIONIST, PATIENT]
          description: Role type
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  message: {type: string}
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  error: {type: string}

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
