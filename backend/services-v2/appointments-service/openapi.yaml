components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from Identity Service

  schemas:
    # ==================== BASIC TYPES ====================
    AppointmentStatus:
      type: string
      enum:
        - SCHEDULED
        - CONFIRMED
        - CHECKED_IN
        - IN_PROGRESS
        - COMPLETED
        - CANCELLED
        - NO_SHOW
        - RESCHEDULED

    AppointmentType:
      type: string
      enum:
        - CONSULTATION
        - FOLLOW_UP
        - EMERGENCY
        - SURGERY
        - TREATMENT
        - VACCINATION
        - CHECK_UP

    Priority:
      type: string
      enum:
        - EMERGENCY
        - URGENT
        - NORMAL
        - LOW

    # ==================== REQUEST SCHEMAS ====================
    ScheduleAppointmentRequest:
      type: object
      required:
        - patientId
        - doctorId
        - departmentId
        - appointmentType
        - scheduledStartTime
        - scheduledEndTime
      properties:
        patientId:
          type: string
          format: uuid
          description: Patient ID
        doctorId:
          type: string
          format: uuid
          description: Doctor ID
        departmentId:
          type: string
          format: uuid
          description: Department ID
        appointmentType:
          $ref: '#/components/schemas/AppointmentType'
        scheduledStartTime:
          type: string
          format: date-time
          description: Appointment start time
        scheduledEndTime:
          type: string
          format: date-time
          description: Appointment end time
        notes:
          type: string
          description: Additional notes
        reason:
          type: string
          description: Appointment reason
        isRecurring:
          type: boolean
          default: false
          description: Is this a recurring appointment
        recurringPattern:
          type: object
          properties:
            frequency:
              type: string
              enum: [daily, weekly, monthly]
            interval:
              type: integer
              minimum: 1
            endDate:
              type: string
              format: date
          description: Recurring pattern configuration

    ConfirmAppointmentRequest:
      type: object
      properties:
        notes:
          type: string
          description: Confirmation notes
        notifyPatient:
          type: boolean
          default: true
          description: Whether to notify patient

    CompleteAppointmentRequest:
      type: object
      properties:
        actualEndTime:
          type: string
          format: date-time
          description: Actual end time
        outcome:
          type: string
          description: Appointment outcome
        notes:
          type: string
          description: Completion notes
        followUpRequired:
          type: boolean
          default: false
          description: Is follow-up required
        followUpDate:
          type: string
          format: date
          description: Follow-up date if required

    CancelAppointmentRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          description: Cancellation reason
        cancelledBy:
          type: string
          enum: [PATIENT, DOCTOR, ADMIN, SYSTEM]
          description: Who cancelled the appointment
        refundPolicy:
          type: string
          enum: [FULL_REFUND, PARTIAL_REFUND, NO_REFUND]
          description: Refund policy applied
        notifyPatient:
          type: boolean
          default: true
          description: Whether to notify patient

    RescheduleAppointmentRequest:
      type: object
      required:
        - newScheduledStartTime
        - newScheduledEndTime
      properties:
        newScheduledStartTime:
          type: string
          format: date-time
          description: New start time
        newScheduledEndTime:
          type: string
          format: date-time
          description: New end time
        reason:
          type: string
          description: Reschedule reason
        rescheduledBy:
          type: string
          enum: [PATIENT, DOCTOR, ADMIN, SYSTEM]
          description: Who rescheduled the appointment
        notifyPatient:
          type: boolean
          default: true
          description: Whether to notify patient

    CheckInAppointmentRequest:
      type: object
      properties:
        actualCheckInTime:
          type: string
          format: date-time
          description: Actual check-in time (defaults to now)
        notes:
          type: string
          description: Check-in notes

    NoShowAppointmentRequest:
      type: object
      properties:
        noShowTime:
          type: string
          format: date-time
          description: No-show time (defaults to now)
        reason:
          type: string
          description: No-show reason
        notifyPatient:
          type: boolean
          default: true
          description: Whether to notify patient

    StartAppointmentRequest:
      type: object
      properties:
        actualStartTime:
          type: string
          format: date-time
          description: Actual start time (defaults to now)
        notes:
          type: string
          description: Start notes

    BulkRescheduleRequest:
      type: object
      required:
        - appointmentIds
        - newStartTime
        - reason
      properties:
        appointmentIds:
          type: array
          items:
            type: string
            format: uuid
          description: List of appointment IDs to reschedule
        newStartTime:
          type: string
          format: date-time
          description: New start time for all appointments
        reason:
          type: string
          description: Reschedule reason
        notifyPatients:
          type: boolean
          default: true
          description: Whether to notify all patients

    EmergencyAppointmentRequest:
      type: object
      required:
        - patientId
        - doctorId
        - departmentId
        - emergencyLevel
        - reason
      properties:
        patientId:
          type: string
          format: uuid
        doctorId:
          type: string
          format: uuid
        departmentId:
          type: string
          format: uuid
        emergencyLevel:
          type: string
          enum: [CRITICAL, URGENT, HIGH]
        reason:
          type: string
          description: Emergency reason
        estimatedDuration:
          type: integer
          minimum: 15
          maximum: 240
          description: Estimated duration in minutes

    TransferAppointmentRequest:
      type: object
      required:
        - newDoctorId
        - reason
      properties:
        newDoctorId:
          type: string
          format: uuid
          description: New doctor ID
        newDepartmentId:
          type: string
          format: uuid
          description: New department ID (if changing department)
        reason:
          type: string
          description: Transfer reason
        notifyPatient:
          type: boolean
          default: true
          description: Whether to notify patient

    RecurringAppointmentRequest:
      type: object
      required:
        - baseAppointment
        - recurringPattern
      properties:
        baseAppointment:
          $ref: '#/components/schemas/ScheduleAppointmentRequest'
        recurringPattern:
          type: object
          required:
            - frequency
            - interval
            - endDate
          properties:
            frequency:
              type: string
              enum: [daily, weekly, monthly]
            interval:
              type: integer
              minimum: 1
              description: Interval between appointments
            endDate:
              type: string
              format: date
              description: End date for recurring series
            maxOccurrences:
              type: integer
              minimum: 1
              maximum: 52
              description: Maximum number of occurrences
            daysOfWeek:
              type: array
              items:
                type: string
                enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
              description: Days of week for weekly appointments

    # ==================== QUEUE SCHEMAS ====================
    CallNextPatientRequest:
      type: object
      required:
        - doctorId
      properties:
        doctorId:
          type: string
          pattern: '^DEPT-DOC-\d{6}-\d{3}$'
          description: Doctor ID
        priorityFilter:
          type: string
          enum: [EMERGENCY, URGENT, NORMAL, LOW]
          description: Filter by priority level

    JoinQueueRequest:
      type: object
      required:
        - patientId
        - doctorId
        - priority
      properties:
        patientId:
          type: string
          pattern: '^PAT-\d{6}-\d{3}$'
          description: Patient ID
        doctorId:
          type: string
          pattern: '^DEPT-DOC-\d{6}-\d{3}$'
          description: Doctor ID
        appointmentId:
          type: string
          format: uuid
          description: Associated appointment ID
        departmentId:
          type: string
          format: uuid
          description: Department ID
        priority:
          $ref: '#/components/schemas/Priority'
        checkInTime:
          type: string
          format: date-time
          description: Check-in time (defaults to now)

    LeaveQueueRequest:
      type: object
      required:
        - patientId
        - doctorId
      properties:
        patientId:
          type: string
          pattern: '^PAT-\d{6}-\d{3}$'
          description: Patient ID
        doctorId:
          type: string
          pattern: '^DEPT-DOC-\d{6}-\d{3}$'
          description: Doctor ID
        reason:
          type: string
          description: Leave queue reason

    ManageRemindersRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum: [enable, disable, reschedule]
          description: Action to perform
        reminderWindows:
          type: array
          items:
            type: object
            required:
              - window
              - channels
            properties:
              window:
                type: string
                pattern: '^\d+(h|m)$'
                description: Time window (e.g., 24h, 2h, 30m)
              channels:
                type: array
                items:
                  type: string
                  enum: [SMS, EMAIL, APP]
                description: Notification channels

    # ==================== WAITLIST SCHEMAS ====================
    AddToWaitlistRequest:
      type: object
      required:
        - patientId
        - appointmentType
      properties:
        patientId:
          type: string
          format: uuid
        preferredDoctorId:
          type: string
          format: uuid
        preferredDepartmentId:
          type: string
          format: uuid
        preferredDate:
          type: string
          format: date
        preferredTimeSlot:
          type: string
          description: Preferred time slot
        appointmentType:
          type: string
          description: Appointment type
        priority:
          $ref: '#/components/schemas/Priority'
        notes:
          type: string
        reason:
          type: string
        isFlexibleDate:
          type: boolean
          default: false
        isFlexibleTime:
          type: boolean
          default: false
        isFlexibleDoctor:
          type: boolean
          default: false
        expiresAt:
          type: string
          format: date-time
        contactPhone:
          type: string
        contactEmail:
          type: string
          format: email
        preferredContactMethod:
          type: string
          enum: [SMS, EMAIL, PUSH, CALL]

    UpdateWaitlistRequest:
      type: object
      properties:
        preferredDate:
          type: string
          format: date
        preferredTimeSlot:
          type: string
        preferredDoctorId:
          type: string
          format: uuid
        priority:
          $ref: '#/components/schemas/Priority'
        notes:
          type: string
        status:
          type: string
          enum: [WAITING, MATCHED, CONVERTED, CANCELLED, EXPIRED]
        isFlexibleDate:
          type: boolean
        isFlexibleTime:
          type: boolean
        isFlexibleDoctor:
          type: boolean

    RemoveFromWaitlistRequest:
      type: object
      properties:
        reason:
          type: string
          description: Removal reason

    ConvertWaitlistRequest:
      type: object
      required:
        - appointmentDate
        - appointmentTime
        - doctorId
      properties:
        appointmentDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: Appointment date (YYYY-MM-DD)
        appointmentTime:
          type: string
          pattern: '^\d{2}:\d{2}(:\d{2})?$'
          description: Appointment time (HH:mm or HH:mm:ss)
        doctorId:
          type: string
          format: uuid
        departmentId:
          type: string
          format: uuid
        durationMinutes:
          type: integer
          minimum: 5
          maximum: 480
          description: Appointment duration in minutes

    # ==================== REMINDER SCHEMAS ====================
    CreateReminderRequest:
      type: object
      required:
        - reminderType
        - reminderChannel
        - sendBeforeMinutes
        - message
        - recipientType
      properties:
        reminderType:
          type: string
          enum: [email, sms, push, in_app]
        reminderChannel:
          type: string
          enum: [email, sms, push_notification, in_app_notification]
        sendBeforeMinutes:
          type: integer
          minimum: 1
          description: Minutes before appointment to send reminder
        message:
          type: string
        recipientType:
          type: string
          enum: [patient, doctor, both]
        recipientEmail:
          type: string
          format: email
        recipientPhone:
          type: string
        priority:
          type: string
          enum: [low, normal, high, urgent]
          default: normal
        maxRetries:
          type: integer
          minimum: 0
          maximum: 10
          default: 3

    UpdateReminderRequest:
      type: object
      properties:
        subject:
          type: string
        message:
          type: string
        priority:
          type: string
          enum: [low, normal, high, urgent]
        metadata:
          type: object
          description: Additional metadata

