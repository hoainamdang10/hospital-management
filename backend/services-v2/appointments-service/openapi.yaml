openapi: 3.1.0
info:
  title: Appointments Service API
  description: |
    Hospital Management System V2 - Appointments Service with CQRS, Event-Driven Architecture, and Clean Architecture patterns.
    
    ## Features
    - Appointment Management (Schedule, Confirm, Cancel, Reschedule, Complete)
    - Queue Management (Call next patient, Join/Leave queue)
    - Waitlist Management (Add to waitlist, Convert to appointment)
    - Availability Checking (Time slots, Provider schedules)
    - Reminder Management (Manual reminders)
    - Emergency Appointments
    - Recurring Appointments
    - Bulk Operations
    - Analytics & Reporting
    
    ## Architecture
    - Clean Architecture with DDD patterns
    - CQRS (Command Query Responsibility Segregation)
    - Event-Driven Architecture
    - Port: 3024 (External), 3004 (Internal)
    - Command Pattern for business operations
    
    ## Design Philosophy
    Uses Command Pattern instead of RESTful CRUD for better business context:
    - POST /appointments/:id/cancel (instead of DELETE)
    - POST /appointments/:id/reschedule (instead of PUT)
    - Each command represents a specific business action
  version: 3.0.0
  contact:
    name: Hospital Management Team
    email: support@hospital-management.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3024
    description: Development server
  - url: https://api.hospital-management.com/appointments
    description: Production server

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Health check and monitoring endpoints
  - name: Appointments (Commands)
    description: Write operations - Schedule, confirm, cancel, reschedule appointments
  - name: Appointments (Queries)
    description: Read operations - Get appointments with denormalized data (CQRS)
  - name: Queue Management
    description: Patient queue operations and management
  - name: Waitlist Management
    description: Appointment waitlist operations
  - name: Availability
    description: Check doctor availability and find time slots
  - name: Reminder Management
    description: Manual appointment reminder operations
  - name: Utilities
    description: History, statistics, and utility endpoints

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check endpoint
      description: Check the health status of the Appointments Service
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ==================== APPOINTMENT COMMANDS ====================
  /api/v1/appointments:
    post:
      tags: [Appointments (Commands)]
      summary: Schedule a new appointment
      description: Create a new appointment with validation and conflict checking
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleAppointmentRequest'
      responses:
        '201':
          description: Appointment scheduled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleAppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Appointment conflict or slot unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags: [Appointments (Commands)]
      summary: List appointments (legacy - use V2 for better performance)
      description: List appointments with basic filtering (uses write model)
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: query
          description: Filter by patient ID
          schema:
            type: string
            format: uuid
        - name: doctorId
          in: query
          description: Filter by doctor ID
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          description: Filter by start date
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter by end date
          schema:
            type: string
            format: date
        - name: status
          in: query
          description: Filter by appointment status
          schema:
            $ref: '#/components/schemas/AppointmentStatus'
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: List of appointments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAppointmentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}:
    get:
      tags: [Appointments (Commands)]
      summary: Get appointment by ID (legacy)
      description: Get appointment details using write model
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Appointment retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}/confirm:
    post:
      tags: [Appointments (Commands)]
      summary: Confirm appointment
      description: Confirm an appointment and send notifications
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmAppointmentRequest'
      responses:
        '200':
          description: Appointment confirmed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}/complete:
    post:
      tags: [Appointments (Commands)]
      summary: Complete appointment
      description: Mark an appointment as completed
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteAppointmentRequest'
      responses:
        '200':
          description: Appointment completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}/cancel:
    post:
      tags: [Appointments (Commands)]
      summary: Cancel appointment
      description: Cancel an appointment with refund policy and notifications
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAppointmentRequest'
      responses:
        '200':
          description: Appointment cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}/reschedule:
    post:
      tags: [Appointments (Commands)]
      summary: Reschedule appointment
      description: Reschedule an appointment to a new time slot
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RescheduleAppointmentRequest'
      responses:
        '200':
          description: Appointment rescheduled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: New time slot is not available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}/check-in:
    post:
      tags: [Appointments (Commands)]
      summary: Check-in appointment
      description: Mark patient as checked in for appointment
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckInAppointmentRequest'
      responses:
        '200':
          description: Patient checked in successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}/no-show:
    post:
      tags: [Appointments (Commands)]
      summary: Mark appointment as no-show
      description: Mark patient as no-show for appointment
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NoShowAppointmentRequest'
      responses:
        '200':
          description: Appointment marked as no-show successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}/start:
    post:
      tags: [Appointments (Commands)]
      summary: Start appointment
      description: Mark appointment as started (begin consultation)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartAppointmentRequest'
      responses:
        '200':
          description: Appointment started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/bulk-reschedule:
    post:
      tags: [Appointments (Commands)]
      summary: Bulk reschedule appointments
      description: Reschedule multiple appointments at once
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkRescheduleRequest'
      responses:
        '200':
          description: Bulk reschedule completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/emergency:
    post:
      tags: [Appointments (Commands)]
      summary: Create emergency appointment
      description: Create an emergency appointment bypassing normal scheduling
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmergencyAppointmentRequest'
      responses:
        '201':
          description: Emergency appointment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/{id}/transfer:
    post:
      tags: [Appointments (Commands)]
      summary: Transfer appointment
      description: Transfer appointment to another doctor or department
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferAppointmentRequest'
      responses:
        '200':
          description: Appointment transferred successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/recurring:
    post:
      tags: [Appointments (Commands)]
      summary: Create recurring appointment series
      description: Create a series of recurring appointments
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecurringAppointmentRequest'
      responses:
        '201':
          description: Recurring appointment series created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecurringAppointmentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== APPOINTMENT QUERIES (CQRS) ====================
  /api/v1/appointments/{id}/query:
    get:
      tags: [Appointments (Queries)]
      summary: Get appointment details (CQRS Read Model)
      description: Get appointment with denormalized patient/doctor data
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Appointment ID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Appointment details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentDetailsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/query:
    get:
      tags: [Appointments (Queries)]
      summary: List appointments (CQRS Read Model)
      description: List appointments with optimized read performance
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: query
          description: Filter by patient ID
          schema:
            type: string
            format: uuid
        - name: doctorId
          in: query
          description: Filter by doctor ID
          schema:
            type: string
            format: uuid
        - name: departmentId
          in: query
          description: Filter by department ID
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          description: Filter by start date
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter by end date
          schema:
            type: string
            format: date
        - name: status
          in: query
          description: Filter by appointment status
          schema:
            $ref: '#/components/schemas/AppointmentStatus'
        - name: appointmentType
          in: query
          description: Filter by appointment type
          schema:
            $ref: '#/components/schemas/AppointmentType'
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Appointments list retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/patients/{patientId}/appointments:
    get:
      tags: [Appointments (Queries)]
      summary: Get patient appointments
      description: Get all appointments for a specific patient
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          description: Patient ID
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          description: Filter by start date
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter by end date
          schema:
            type: string
            format: date
        - name: status
          in: query
          description: Filter by appointment status
          schema:
            $ref: '#/components/schemas/AppointmentStatus'
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Patient appointments retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/doctors/{doctorId}/appointments:
    get:
      tags: [Appointments (Queries)]
      summary: Get doctor appointments
      description: Get all appointments for a specific doctor
      security:
        - BearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          description: Doctor ID
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          description: Filter by start date
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: Filter by end date
          schema:
            type: string
            format: date
        - name: status
          in: query
          description: Filter by appointment status
          schema:
            $ref: '#/components/schemas/AppointmentStatus'
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Doctor appointments retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== AVAILABILITY ====================
  /api/v1/appointments/providers/{providerId}/available-slots:
    get:
      tags: [Availability]
      summary: Get available time slots for provider
      description: Get available appointment slots for a specific provider on a date
      security:
        - BearerAuth: []
      parameters:
        - name: providerId
          in: path
          required: true
          description: Provider ID (Staff ID)
          schema:
            type: string
            pattern: '^[A-Z]{4}-DOC-\d{6}-\d{3}$'
        - name: date
          in: query
          required: true
          description: Date to check availability (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: duration
          in: query
          description: Appointment duration in minutes
          schema:
            type: integer
            minimum: 15
            maximum: 120
            default: 30
      responses:
        '200':
          description: Available slots retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableSlotsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/appointments/providers/{providerId}/schedule:
    get:
      tags: [Availability]
      summary: Get provider work schedule
      description: Get cached work schedule template for provider
      security:
        - BearerAuth: []
      parameters:
        - name: providerId
          in: path
          required: true
          description: Provider ID (Staff ID)
          schema:
            type: string
            pattern: '^[A-Z]{4}-DOC-\d{6}-\d{3}$'
      responses:
        '200':
          description: Provider schedule retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderScheduleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ==================== QUEUE MANAGEMENT ====================
  /api/v1/queue/call-next:
    post:
      tags: [Queue Management]
      summary: Call next patient in queue
      description: Call the next patient from the queue for a doctor
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CallNextPatientRequest'
      responses:
        '200':
          description: Next patient called successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueOperationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/queue/join:
    post:
      tags: [Queue Management]
      summary: Join queue
      description: Add patient to queue for a doctor
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinQueueRequest'
      responses:
        '201':
          description: Patient joined queue successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueOperationResponse'
        '400':
