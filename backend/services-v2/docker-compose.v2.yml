  # Supporting Services
  # Scheduler Service - REMOVED (functionality moved to cron jobs in Notifications Service)
  # Uncomment if need to revert to centralized scheduler
  # scheduler-service:
  #   build:
  #     context: ./scheduler-service
  #     dockerfile: Dockerfile
  #   container_name: hospital-scheduler-v2
  #   env_file:
