# Hospital Management System - Services V2
# Clean Architecture + DDD + CQRS + Event-Driven Implementation
#
# @author Hospital Management Team
# @version 2.0.0

version: "3.8"

networks:
  hospital-v2-network:
    driver: bridge

volumes:
  redis-v2-data:
  rabbitmq-v2-data:

services:
  # Infrastructure Services
  redis-v2:
    image: redis:7-alpine
    container_name: hospital-redis-v2
    ports:
      - "6379:6379"
    volumes:
      - redis-v2-data:/data
    command: redis-server --appendonly yes
    networks:
      - hospital-v2-network
    profiles:
      - infrastructure
      - dev
      - full

  rabbitmq-v2:
    image: rabbitmq:3-management-alpine
    container_name: hospital-rabbitmq-v2
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-v2-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - hospital-v2-network
    profiles:
      - infrastructure
      - dev
      - full

  # API Gateway - Entry Point for All Requests
  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: hospital-api-gateway-v2
    env_file:
      - .env.docker
      - ./api-gateway/.env.docker
    ports:
      - "3101:3101"
    environment:
      # - NODE_ENV=development # Commented for production mode
      - NODE_ENV=production
      - PORT=3101
      # Supabase Configuration (for JWT validation)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      # JWT Configuration (must match Supabase JWT Secret)
      - JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_ISSUER=hospital-management-system
      - JWT_AUDIENCE=api-gateway
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - PATIENT_REGISTRY_SERVICE_URL=http://patient-registry-service:3002
      - PROVIDER_STAFF_SERVICE_URL=http://provider-staff-service:3003
      - APPOINTMENTS_SERVICE_URL=http://appointments-service:3004
      # Clinical EMR Service - REMOVED FOR MVP (Focus on Appointments)
      # - CLINICAL_EMR_SERVICE_URL=http://clinical-emr-service:3007
      - BILLING_SERVICE_URL=http://billing-service:3009
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:3011
      # Department Service - REMOVED (merged into Provider/Staff Service)
      # Scheduler Service - REMOVED (functionality moved to cron jobs in Notifications Service)
      # - SCHEDULER_SERVICE_URL=http://scheduler-service:3030
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3101
      # Redis Configuration (for distributed rate limiting)
      - REDIS_URL=redis://redis-v2:6379
      - REDIS_PASSWORD=
      - REDIS_RATE_LIMIT_DB=1
      # Rate Limiting Configuration
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=1000
      - RATE_LIMIT_USER_WINDOW_MS=900000
      - RATE_LIMIT_USER_MAX_REQUESTS=500
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      # Timeout Configuration
      - TIMEOUT_HEALTH_CHECK=3000
      - TIMEOUT_SERVICE_FAST=5000
      - TIMEOUT_SERVICE_NORMAL=10000
      - TIMEOUT_SERVICE_SLOW=30000
      - TIMEOUT_PROXY_REQUEST=15000
      - TIMEOUT_PROXY_UPSTREAM=12000
      - TIMEOUT_CIRCUIT_BREAKER_RESET=30000
      - TIMEOUT_CIRCUIT_BREAKER_HALF_OPEN=10000
      # Circuit Breaker Configuration
      - CIRCUIT_BREAKER_THRESHOLD=5
      - CIRCUIT_BREAKER_MONITORING_PERIOD=60000
      - CIRCUIT_BREAKER_HALF_OPEN_MAX_CALLS=3
      # Fallback Cache Configuration
      - ENABLE_FALLBACK_CACHE=true
      - CACHE_FALLBACK_TTL=300000
      - CACHE_MAX_SIZE=1000
      # Retry Policy Configuration
      - RETRY_MAX_ATTEMPTS=3
      - RETRY_INITIAL_DELAY_MS=100
      - RETRY_MAX_DELAY_MS=5000
      - RETRY_BACKOFF_MULTIPLIER=2
      # Request/Response Size Limits
      - REQUEST_SIZE_LIMIT=1048576
      - ENABLE_RESPONSE_SIZE_MONITORING=true
      - MAX_RESPONSE_SIZE=10485760
      # Health Check Configuration
      - HEALTH_CHECK_MAX_RETRIES=2
      - HEALTH_CHECK_RETRY_DELAY_MS=100
      - HEALTH_CHECK_CACHE_TTL_MS=15000
      - HEALTH_CHECK_INTERVAL_MS=10000
      - HEALTH_CHECK_STARTUP_GRACE_MS=20000
    depends_on:
      redis-v2:
        condition: service_started
      rabbitmq-v2:
        condition: service_started
      identity-service:
        condition: service_healthy
      patient-registry-service:
        condition: service_healthy
      provider-staff-service:
        condition: service_healthy
      appointments-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      notifications-service:
        condition: service_healthy
    networks:
      - hospital-v2-network
    profiles:
      - gateway
      - dev
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3101/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Core Services
  # Identity Service - Production-Ready with Circuit Breaker & Monitoring
  identity-service:
    build:
      context: .
      dockerfile: ./identity-service/Dockerfile
    container_name: hospital-identity-service-v2
    env_file:
      - .env.docker
      - ./identity-service/.env.docker
    ports:
      - "3001:3001"
    environment:
      # - NODE_ENV=test # Commented for production mode
      - NODE_ENV=production
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=auth_schema
      - SERVICE_NAME=identity-service
      - SERVICE_VERSION=2.0.0
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3101
      # Email Verification Configuration
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_DELIVERY_MODE=${EMAIL_DELIVERY_MODE}
      - AUTO_VERIFY_PENDING=${AUTO_VERIFY_PENDING}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
      # Internal service authentication (disabled for demo/development)
      - INTERNAL_AUTH_ENABLED=false
    depends_on:
      - redis-v2
      - rabbitmq-v2
    networks:
      - hospital-v2-network
    profiles:
      - core
      - dev
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Identity Service - Test Environment (No Rate Limiting)
  identity-service-test:
    build:
      context: .
      dockerfile: ./identity-service/Dockerfile
    container_name: hospital-identity-service-v2-test
    ports:
      - "3001:3001"
    environment:
      # - NODE_ENV=test # Commented for production mode
      - NODE_ENV=production
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=auth_schema
      - SERVICE_NAME=identity-service
      - SERVICE_VERSION=2.0.0
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3101
      - LOG_LEVEL=error
      # Email Verification Configuration
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis-v2
      - rabbitmq-v2
    networks:
      - hospital-v2-network
    profiles:
      - test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  patient-registry-service:
    build:
      context: .
      dockerfile: ./patient-registry-service/Dockerfile
    container_name: hospital-patient-registry-v2
    env_file:
      - .env.docker
      - ./patient-registry-service/.env.docker
    ports:
      - "3002:3002"
    environment:
      # - NODE_ENV=development # Commented for production mode
      - NODE_ENV=production
      - PORT=3002
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=patient_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - BYPASS_AUTH=${BYPASS_AUTH}
      - BYPASS_AUTH_USER_ID=${BYPASS_AUTH_USER_ID}
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
    networks:
      - hospital-v2-network
    profiles:
      - core
      - dev
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  provider-staff-service:
    build:
      context: .
      dockerfile: ./provider-staff-service/Dockerfile
    container_name: hospital-provider-staff-v2
    env_file:
      - .env.docker
      - ./provider-staff-service/.env.docker
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=provider_schema
      # Department management now integrated (departments_schema also accessible)
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - BYPASS_AUTH=false
      - DISABLE_RATE_LIMIT=true
      # Service-to-service auth token (shared with appointments-service)
      - PROVIDER_INTERNAL_TOKEN=dev-provider-internal-token
      - INTERNAL_SERVICE_TOKEN=dev-provider-internal-token
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
    networks:
      - hospital-v2-network
    profiles:
      - core
      - dev
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Reference Data Services
  # Department Service - REMOVED
  # Department functionality is now part of Provider/Staff Service
  # This eliminates an unnecessary microservice and improves bounded context alignment
  # Departments are a simple reference data module within Staff & Organization Management

  # Business Services
  appointments-service:
    build:
      context: .
      dockerfile: ./appointments-service/Dockerfile
    container_name: hospital-appointments-v2
    env_file:
      - .env.docker
      - ./appointments-service/.env.docker
    ports:
      - "3004:3004"
    environment:
      # - NODE_ENV=development # Commented for production mode
      - NODE_ENV=production
      - PORT=3004
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=appointments_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - PATIENT_SERVICE_URL=http://patient-registry-service:3002
      - PROVIDER_SERVICE_URL=http://provider-staff-service:3003
      - ENABLE_SCHEDULER=true
      # Service-to-service auth token (shared with provider-staff-service)
      - PROVIDER_INTERNAL_TOKEN=dev-provider-internal-token
      # Scheduler Service - REMOVED (functionality moved to cron jobs in Notifications Service)
      # - SCHEDULER_SERVICE_URL=http://scheduler-service:3030
      # - SCHEDULER_API_KEY=${SCHEDULER_API_KEY}
      - OUTBOX_RESERVED_TIMEOUT_MINUTES=5
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
      - patient-registry-service
      - provider-staff-service
      # - scheduler-service # REMOVED - Scheduler functionality moved to cron jobs
    networks:
      - hospital-v2-network
    profiles:
      - business
      - dev
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

