# Hospital Management System - Services V2
# Clean Architecture + DDD + CQRS + Event-Driven Implementation
# 
# @author Hospital Management Team
# @version 2.0.0

version: '3.8'

networks:
  hospital-v2-network:
    driver: bridge

volumes:
  redis-v2-data:
  rabbitmq-v2-data:

services:
  # Infrastructure Services
  redis-v2:
    image: redis:7-alpine
    container_name: hospital-redis-v2
    ports:
      - "6380:6379"
    volumes:
      - redis-v2-data:/data
    command: redis-server --appendonly yes
    networks:
      - hospital-v2-network
    profiles:
      - infrastructure
      - dev
      - full

  rabbitmq-v2:
    image: rabbitmq:3-management-alpine
    container_name: hospital-rabbitmq-v2
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq-v2-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - hospital-v2-network
    profiles:
      - infrastructure
      - dev
      - full

  # Core Services
  # Identity Service - Production-Ready with Circuit Breaker & Monitoring
  identity-service:
    build:
      context: .
      dockerfile: ./identity-service/Dockerfile
    container_name: hospital-identity-service-v2
    ports:
      - "3021:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=auth_schema
      - SERVICE_NAME=identity-service
      - SERVICE_VERSION=2.0.0
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:3101
    depends_on:
      - redis-v2
      - rabbitmq-v2
    networks:
      - hospital-v2-network
    profiles:
      - core
      - dev
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  patient-registry-service:
    build:
      context: .
      dockerfile: ./patient-registry-service/Dockerfile
    container_name: hospital-patient-registry-v2
    ports:
      - "3023:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=patient_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
    networks:
      - hospital-v2-network
    profiles:
      - core
      - dev
      - full

  provider-staff-service:
    build:
      context: .
      dockerfile: ./provider-staff-service/Dockerfile
    container_name: hospital-provider-staff-v2
    ports:
      - "3022:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=provider_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
    networks:
      - hospital-v2-network
    profiles:
      - core
      - dev
      - full

  # Business Services
  scheduling-service:
    build:
      context: .
      dockerfile: ./scheduling-service/Dockerfile
    container_name: hospital-scheduling-v2
    ports:
      - "3024:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=scheduling_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - PATIENT_SERVICE_URL=http://patient-registry-service:3003
      - PROVIDER_SERVICE_URL=http://provider-staff-service:3002
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
      - patient-registry-service
      - provider-staff-service
    networks:
      - hospital-v2-network
    profiles:
      - business
      - dev
      - full

  clinical-emr-service:
    build:
      context: .
      dockerfile: ./clinical-emr-service/Dockerfile
    container_name: hospital-clinical-emr-v2
    ports:
      - "3027:3007"
    environment:
      - NODE_ENV=development
      - PORT=3007
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=clinical_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - PATIENT_SERVICE_URL=http://patient-registry-service:3003
      - PROVIDER_SERVICE_URL=http://provider-staff-service:3002
      - SCHEDULING_SERVICE_URL=http://scheduling-service:3004
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
      - patient-registry-service
      - provider-staff-service
      - scheduling-service
    networks:
      - hospital-v2-network
    profiles:
      - business
      - dev
      - full

  # Supporting Services
  billing-service:
    build:
      context: .
      dockerfile: ./billing-service/Dockerfile
    container_name: hospital-billing-v2
    ports:
      - "3029:3009"
    environment:
      - NODE_ENV=development
      - PORT=3009
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=billing_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - PATIENT_SERVICE_URL=http://patient-registry-service:3003
      - CLINICAL_SERVICE_URL=http://clinical-emr-service:3007
      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID}
      - PAYOS_API_KEY=${PAYOS_API_KEY}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY}
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
      - patient-registry-service
      - clinical-emr-service
    networks:
      - hospital-v2-network
    profiles:
      - supporting
      - dev
      - full

  notifications-service:
    build:
      context: .
      dockerfile: ./notifications-service/Dockerfile
    container_name: hospital-notifications-v2
    ports:
      - "3031:3011"
    environment:
      - NODE_ENV=development
      - PORT=3011
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=notification_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - EMAIL_SERVICE_API_KEY=${EMAIL_SERVICE_API_KEY}
      - SMS_SERVICE_API_KEY=${SMS_SERVICE_API_KEY}
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
    networks:
      - hospital-v2-network
    profiles:
      - supporting
      - dev
      - full

  # API Gateway V2
  api-gateway-v2:
    build:
      context: .
      dockerfile: ./api-gateway-v2/Dockerfile
    container_name: hospital-api-gateway-v2
    ports:
      - "3101:3101"
    environment:
      - NODE_ENV=development
      - PORT=3101
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - PATIENT_SERVICE_URL=http://patient-registry-service:3003
      - PROVIDER_SERVICE_URL=http://provider-staff-service:3002
      - SCHEDULING_SERVICE_URL=http://scheduling-service:3004
      - CLINICAL_SERVICE_URL=http://clinical-emr-service:3007
      - BILLING_SERVICE_URL=http://billing-service:3009
      - NOTIFICATIONS_SERVICE_URL=http://notifications-service:3011
      - REDIS_URL=redis://redis-v2:6379
      - CORS_ORIGIN=http://localhost:3000,http://localhost:3101
    depends_on:
      - identity-service
      - patient-registry-service
      - provider-staff-service
      - scheduling-service
      - clinical-emr-service
      - billing-service
      - notifications-service
    networks:
      - hospital-v2-network
    profiles:
      - gateway
      - dev
      - full
