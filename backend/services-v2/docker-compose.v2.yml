  billing-service:
    build:
      context: .
      dockerfile: ./billing-service/Dockerfile
    container_name: hospital-billing-v2
    env_file:
      - .env.docker
      - ./billing-service/.env.docker
    ports:
      - "3009:3009"
    environment:
      # - NODE_ENV=development # Commented for production mode
      - NODE_ENV=production
      - PORT=3009
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=billing_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      - PATIENT_SERVICE_URL=http://patient-registry-service:3002
      # Clinical EMR Service - REMOVED FOR MVP (Focus on Appointments)
      # - CLINICAL_SERVICE_URL=http://clinical-emr-service:3007
      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID}
      - PAYOS_API_KEY=${PAYOS_API_KEY}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY}
      - PAYOS_RETURN_URL=http://localhost:3000/patient/billing/payment/success
      - PAYOS_CANCEL_URL=http://localhost:3000/patient/billing/payment/cancel
      # VNPAY Configuration
      - VNPAY_TMN_CODE=${VNPAY_TMN_CODE}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
      - VNPAY_WEBHOOK_URL=${VNPAY_WEBHOOK_URL}
      - VNPAY_BASE_URL=${VNPAY_BASE_URL}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL}
      - VNPAY_CANCEL_URL=${VNPAY_CANCEL_URL}
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
      - patient-registry-service
      # - clinical-emr-service # REMOVED FOR MVP
    networks:
      - hospital-v2-network
    profiles:
      - business
      - dev
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3009/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notifications-service:
    build:
      context: .
      dockerfile: ./notifications-service/Dockerfile
    container_name: hospital-notifications-v2
    env_file:
      - .env.docker
      - ./notifications-service/.env.docker
    ports:
      - "3011:3011"
    environment:
      # - NODE_ENV=development # Commented for production mode
      - NODE_ENV=production
      - PORT=3011
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis-v2:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
      - DATABASE_SCHEMA=notifications_schema
      - IDENTITY_SERVICE_URL=http://identity-service:3001
      # SendGrid Email Configuration
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME}
      # Twilio SMS Configuration
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      # Reminder Cron Job Configuration
      - REMINDER_CRON_ENABLED=true
      - REMINDER_CRON_EXPRESSION=*/5 * * * *
      - REMINDER_BATCH_SIZE=100
    depends_on:
      - redis-v2
      - rabbitmq-v2
      - identity-service
    networks:
      - hospital-v2-network
    profiles:
      - supporting
      - dev
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3011/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ARCHIVED - Notifications Consumer (Replaced by ReminderCronJob in Notifications Service)
  # The cron job now runs inside notifications-service container
  # Uncomment if need to revert to separate consumer architecture
  # notifications-consumer:
  #   build:
  #     context: .
  #     dockerfile: ./notifications-service/Dockerfile.consumer
  #   container_name: hospital-notifications-consumer-v2
  #   environment:
  #     - NODE_ENV=production
  #     - SUPABASE_URL=${SUPABASE_URL}
  #     - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
  #     - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
  #     - RABBITMQ_URL=amqp://admin:admin@rabbitmq-v2:5672
  #     - DATABASE_SCHEMA=notifications_schema
  #     - SENDGRID_API_KEY=${SENDGRID_API_KEY}
