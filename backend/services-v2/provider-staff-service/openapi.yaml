openapi: 3.1.0
info:
  title: Provider/Staff Service API
  description: |
    Provider/Staff microservice for Hospital Management System V2.
    
    ## Features
    - Staff Management (CRUD operations)
    - Department Assignment
    - Credential Management
    - Status Management (Activate, Suspend, Terminate)
    - Schedule Management
    - Specialization Management
    - Search and Filtering
    
    ## Architecture
    - Clean Architecture with DDD patterns
    - Port: 3022 (External), 3002 (Internal)
    - CQRS Pattern Implementation
    
    ## Authentication
    All endpoints require Bearer token authentication except health endpoints.
  version: 2.0.0
  contact:
    name: Hospital Management Team
    email: support@hospital-management.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3022
    description: Development server
  - url: https://api.hospital-management.com/provider-staff
    description: Production server

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Health check and monitoring endpoints
  - name: Staff Management
    description: Staff CRUD operations and management
  - name: Department
    description: Department assignment and management
  - name: Credentials
    description: Professional credentials management
  - name: Status
    description: Staff status management (activate, suspend, terminate)
  - name: Schedule
    description: Work schedule management
  - name: Specializations
    description: Professional specializations management

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check endpoint
      description: Check the health status of the Provider/Staff Service
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/staff:
    get:
      tags: [Staff Management]
      summary: Get all staff with pagination and filters
      description: Retrieve a paginated list of all staff members with optional filtering
      parameters:
        - name: staffType
          in: query
          description: Filter by staff type
          schema:
            $ref: '#/components/schemas/StaffType'
        - name: departmentId
          in: query
          description: Filter by department ID
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          description: Filter by staff status
          schema:
            $ref: '#/components/schemas/StaffStatus'
        - name: isActive
          in: query
          description: Filter by active status
          schema:
            type: boolean
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sortBy
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [createdAt, updatedAt, lastName, staffId]
        - name: sortOrder
          in: query
          description: Sort order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        '200':
          description: Staff list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Staff Management]
      summary: Register new staff
      description: Create a new staff member in the system
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterStaffRequest'
      responses:
        '201':
          description: Staff registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Staff already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/search:
    get:
      tags: [Staff Management]
      summary: Search staff
      description: Search staff members by various criteria
      parameters:
        - name: searchTerm
          in: query
          description: Search term for name, email, or other fields
          schema:
            type: string
            minLength: 2
            maxLength: 120
        - name: staffType
          in: query
          description: Filter by staff type
          schema:
            $ref: '#/components/schemas/StaffType'
        - name: departmentId
          in: query
          description: Filter by department ID
          schema:
            type: string
            format: uuid
        - name: specialization
          in: query
          description: Filter by specialization
          schema:
            type: string
        - name: status
          in: query
          description: Filter by staff status
          schema:
            $ref: '#/components/schemas/StaffStatus'
        - name: isActive
          in: query
          description: Filter by active status
          schema:
            type: boolean
        - name: isAcceptingNewPatients
          in: query
          description: Filter by acceptance of new patients
          schema:
            type: boolean
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/user/{userId}:
    get:
      tags: [Staff Management]
      summary: Get staff by user ID
      description: Retrieve staff information using the associated user ID
      parameters:
        - name: userId
          in: path
          required: true
          description: User ID (UUID)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Staff retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/license/{licenseNumber}:
    get:
      tags: [Staff Management]
      summary: Get staff by license number
      description: Retrieve staff information using professional license number
      parameters:
        - name: licenseNumber
          in: path
          required: true
          description: Professional license number
          schema:
            type: string
      responses:
        '200':
          description: Staff retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}:
    get:
      tags: [Staff Management]
      summary: Get staff by ID
      description: Retrieve staff information using staff ID
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      responses:
        '200':
          description: Staff retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [Staff Management]
      summary: Update staff information
      description: Update staff member's basic information
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStaffRequest'
      responses:
        '200':
          description: Staff updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/departments:
    post:
      tags: [Department]
      summary: Assign staff to department
      description: Assign a staff member to a specific department
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignDepartmentRequest'
      responses:
        '200':
          description: Staff assigned to department successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/department-head:
    put:
      tags: [Department]
      summary: Set department head
      description: Set a staff member as the head of a department
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetDepartmentHeadRequest'
      responses:
        '200':
          description: Department head set successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/credentials/expiring:
    get:
      tags: [Credentials]
      summary: Get expiring credentials
      description: Retrieve list of staff members with credentials expiring soon
      security:
        - BearerAuth: []
      parameters:
        - name: days
          in: query
          description: Number of days to look ahead for expiring credentials
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Expiring credentials retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedStaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/credentials:
    post:
      tags: [Credentials]
      summary: Add staff credential
      description: Add a new professional credential to a staff member
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCredentialRequest'
      responses:
        '201':
          description: Credential added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/credentials/{credentialNumber}/renew:
    put:
      tags: [Credentials]
      summary: Renew staff credential
      description: Renew an existing professional credential
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
        - name: credentialNumber
          in: path
          required: true
          description: Credential number to renew
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenewCredentialRequest'
      responses:
        '200':
          description: Credential renewed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/credentials/{credentialNumber}:
    delete:
      tags: [Credentials]
      summary: Remove staff credential
      description: Remove a professional credential from a staff member
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
        - name: credentialNumber
          in: path
          required: true
          description: Credential number to remove
          schema:
            type: string
      responses:
        '200':
          description: Credential removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/activate:
    post:
      tags: [Status]
      summary: Activate staff
      description: Activate a staff member's account
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      responses:
        '200':
          description: Staff activated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusChangeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/suspend:
    post:
      tags: [Status]
      summary: Suspend staff
      description: Suspend a staff member's account
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuspendStaffRequest'
      responses:
        '200':
          description: Staff suspended successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusChangeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/reactivate:
    post:
      tags: [Status]
      summary: Reactivate staff
      description: Reactivate a previously suspended staff member
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      responses:
        '200':
          description: Staff reactivated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusChangeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/terminate:
    post:
      tags: [Status]
      summary: Terminate staff
      description: Terminate a staff member's employment
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminateStaffRequest'
      responses:
        '200':
          description: Staff terminated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusChangeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/employment-status:
    patch:
      tags: [Status]
      summary: Update employment status
      description: Update a staff member's employment status
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmploymentStatusRequest'
      responses:
        '200':
          description: Employment status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/schedule:
    get:
      tags: [Schedule]
      summary: Get staff work schedule
      description: Retrieve a staff member's work schedule
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      responses:
        '200':
          description: Schedule retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [Schedule]
      summary: Update staff work schedule
      description: Update a staff member's work schedule
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateScheduleRequest'
      responses:
        '200':
          description: Schedule updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/specializations:
    get:
      tags: [Specializations]
      summary: Get staff specializations
      description: Retrieve a staff member's professional specializations
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      responses:
        '200':
          description: Specializations retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecializationsResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [Specializations]
      summary: Add staff specialization
      description: Add a professional specialization to a staff member
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSpecializationRequest'
      responses:
        '201':
          description: Specialization added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v1/staff/{staffId}/specializations/{specializationCode}:
    delete:
      tags: [Specializations]
      summary: Remove staff specialization
      description: Remove a professional specialization from a staff member
      security:
        - BearerAuth: []
      parameters:
        - name: staffId
          in: path
          required: true
          description: Staff ID in format STAFF-YYYYMM-XXX
          schema:
            type: string
            pattern: '^[A-Z]{3}-[A-Z]{3,5}-\d{6}-\d{3}$'
        - name: specializationCode
          in: path
          required: true
          description: Specialization code to remove
          schema:
            type: string
      responses:
        '200':
          description: Specialization removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from Identity Service

  schemas:
    HealthResponse:
      type: object
      properties:
        overall:
          type: string
          enum: [HEALTHY, DEGRADED, UNHEALTHY]
          description: Overall health status
        database:
          type: object
          properties:
            status:
              type: string
              enum: [HEALTHY, DEGRADED, UNHEALTHY]
            responseTime:
              type: number
              format: double
        redis:
          type: object
          properties:
            status:
              type: string
              enum: [HEALTHY, DEGRADED, UNHEALTHY]
            responseTime:
              type: number
              format: double
        rabbitmq:
          type: object
          properties:
            status:
              type: string
              enum: [HEALTHY, DEGRADED, UNHEALTHY]
            responseTime:
              type: number
              format: double
        timestamp:
          type: string
          format: date-time

    StaffType:
      type: string
      enum:
        - doctor
        - nurse
        - technician
        - pharmacist
        - therapist
        - admin
        - receptionist

    StaffStatus:
      type: string
      enum:
        - active
        - inactive
        - on_leave
        - suspended
        - terminated

    EmploymentType:
      type: string
      enum:
        - full_time
        - part_time
        - contract
        - temporary
        - intern

    RegisterStaffRequest:
      type: object
      required:
        - userId
        - staffType
        - firstName
        - lastName
        - email
        - phone
      properties:
        userId:
          type: string
          format: uuid
          description: Associated user ID
        staffType:
          $ref: '#/components/schemas/StaffType'
        firstName:
          type: string
          minLength: 1
          maxLength: 50
        lastName:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
        departmentId:
          type: string
          format: uuid
          description: Primary department ID
        licenseNumber:
          type: string
          description: Professional license number
        employmentType:
          $ref: '#/components/schemas/EmploymentType'
        hireDate:
          type: string
          format: date
        contractEndDate:
          type: string
          format: date
          description: End date for contract/temporary staff

    UpdateStaffRequest:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 50
        lastName:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            state:
              type: string
            zipCode:
              type: string
            country:
              type: string
        emergencyContact:
          type: object
          properties:
            name:
              type: string
            relationship:
              type: string
            phone:
              type: string

    AssignDepartmentRequest:
      type: object
      required:
        - departmentId
      properties:
        departmentId:
          type: string
          format: uuid
          description: Department ID to assign staff to
        isPrimary:
          type: boolean
          default: false
          description: Whether this is the primary department

    SetDepartmentHeadRequest:
      type: object
      required:
        - departmentId
      properties:
        departmentId:
          type: string
          format: uuid
          description: Department ID where staff will be head

    AddCredentialRequest:
      type: object
      required:
        - credentialType
        - credentialNumber
        - issuingAuthority
        - issueDate
        - expiryDate
      properties:
        credentialType:
          type: string
          description: Type of credential (e.g., Medical License, Board Certification)
        credentialNumber:
          type: string
          description: Credential number/identifier
        issuingAuthority:
          type: string
          description: Authority that issued the credential
        issueDate:
          type: string
          format: date
          description: Date credential was issued
        expiryDate:
          type: string
          format: date
          description: Date credential expires
        verificationUrl:
          type: string
          format: uri
          description: URL to verify credential online

    RenewCredentialRequest:
      type: object
      required:
        - newExpiryDate
      properties:
        newExpiryDate:
          type: string
          format: date
          description: New expiry date for the credential
        verificationDocument:
          type: string
          format: uri
          description: URL to renewal verification document

    SuspendStaffRequest:
      type: object
      properties:
        reason:
          type: string
          description: Reason for suspension
        suspensionStartDate:
          type: string
          format: date
          description: Start date of suspension (defaults to today)
        suspensionEndDate:
          type: string
          format: date
          description: End date of suspension (optional for indefinite)

    TerminateStaffRequest:
      type: object
      properties:
        reason:
          type: string
          description: Reason for termination
        terminationDate:
          type: string
          format: date
          description: Termination date (defaults to today)

    UpdateEmploymentStatusRequest:
      type: object
      properties:
        employmentType:
          $ref: '#/components/schemas/EmploymentType'
        contractEndDate:
          type: string
          format: date
          description: New contract end date

    UpdateScheduleRequest:
      type: object
      properties:
        workSchedule:
          type: object
          properties:
            monday:
              $ref: '#/components/schemas/DaySchedule'
            tuesday:
              $ref: '#/components/schemas/DaySchedule'
            wednesday:
              $ref: '#/components/schemas/DaySchedule'
            thursday:
              $ref: '#/components/schemas/DaySchedule'
            friday:
              $ref: '#/components/schemas/DaySchedule'
            saturday:
              $ref: '#/components/schemas/DaySchedule'
            sunday:
              $ref: '#/components/schemas/DaySchedule'

    DaySchedule:
      type: object
      properties:
        isWorkingDay:
          type: boolean
          default: false
        startTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          description: Start time in HH:MM format
        endTime:
          type: string
          pattern: '^([01]?[0-9]|2[0-3]):[0-5][0-9]$'
          description: End time in HH:MM format
        breakDuration:
          type: integer
          minimum: 0
          description: Break duration in minutes

    AddSpecializationRequest:
      type: object
      required:
        - specializationCode
      properties:
        specializationCode:
          type: string
          description: Medical specialization code
        certificationDate:
          type: string
          format: date
          description: Date certification was obtained
        boardCertified:
          type: boolean
          default: false
          description: Whether board certified

    StaffResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Staff operation completed successfully
        data:
          type: object
          properties:
            staffId:
              type: string
              example: DOC-HCM-202312-001
            userId:
              type: string
              format: uuid
            staffType:
              $ref: '#/components/schemas/StaffType'
            firstName:
              type: string
              example: John
            lastName:
              type: string
              example: Doe
            email:
              type: string
              format: email
            phone:
              type: string
            status:
              $ref: '#/components/schemas/StaffStatus'
            isActive:
              type: boolean
            employmentType:
              $ref: '#/components/schemas/EmploymentType'
            departments:
              type: array
              items:
                type: object
                properties:
                  departmentId:
                    type: string
                    format: uuid
                  departmentName:
                    type: string
                  isPrimary:
                    type: boolean
            credentials:
              type: array
              items:
                type: object
                properties:
                  credentialType:
                    type: string
                  credentialNumber:
                    type: string
                  issuingAuthority:
                    type: string
                  issueDate:
                    type: string
                    format: date
                  expiryDate:
                    type: string
                    format: date
                  isActive:
                    type: boolean
            specializations:
              type: array
              items:
                type: object
                properties:
                  specializationCode:
                    type: string
                  specializationName:
                    type: string
                  certificationDate:
                    type: string
                    format: date
                  boardCertified:
                    type: boolean
            hireDate:
              type: string
              format: date
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time

    PaginatedStaffResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Staff list retrieved successfully
        data:
          type: object
          properties:
            staff:
              type: array
              items:
                $ref: '#/components/schemas/StaffResponse'
            pagination:
              type: object
              properties:
                page:
                  type: integer
                  example: 1
                limit:
                  type: integer
                  example: 20
                total:
                  type: integer
                  example: 150
                totalPages:
                  type: integer
                  example: 8

    ScheduleResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Schedule retrieved successfully
        data:
          type: object
          properties:
            staffId:
              type: string
            workSchedule:
              $ref: '#/components/schemas/UpdateScheduleRequest'
            effectiveDate:
              type: string
              format: date

    SpecializationsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Specializations retrieved successfully
        data:
          type: object
          properties:
            staffId:
              type: string
            specializations:
              type: array
              items:
                type: object
                properties:
                  specializationCode:
                    type: string
                  specializationName:
                    type: string
                  certificationDate:
                    type: string
                    format: date
                  boardCertified:
                    type: boolean
                  isActive:
                    type: boolean

    StatusChangeResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Staff status updated successfully
        data:
          type: object
          properties:
            staffId:
              type: string
            previousStatus:
              $ref: '#/components/schemas/StaffStatus'
            newStatus:
              $ref: '#/components/schemas/StaffStatus'
            effectiveDate:
              type: string
              format: date-time
            reason:
              type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Dữ liệu đầu vào không hợp lệ
        details:
          type: object
          properties:
            field:
              type: string
              example: email
            message:
              type: string
              example: Email is required

  responses:
    BadRequest:
      description: Bad request - Invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Unauthorized:
      description: Unauthorized - Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
