      properties:
        historyId:
          type: string
          format: uuid
          description: Unique history entry identifier
          example: "456e7890-e89b-12d3-a456-426614174111"
        action:
          type: string
          description: Action performed on the record
          example: "UPDATE"
        actorId:
          type: string
          format: uuid
          description: ID of user who performed the action
          example: "789e0123-e89b-12d3-a456-426614174222"
        metadata:
          type: object
          description: Additional metadata about the change
          properties:
            field:
              type: string
              example: "diagnosis"
            oldValue:
              type: string
              example: "Hypertension"
            newValue:
              type: string
              example: "Type 2 diabetes mellitus"
        createdAt:
          type: string
          format: date-time
          description: Timestamp of the change
          example: "2025-01-12T10:30:00Z"
        historyType:
          type: string
          enum: [audit_log, version]
          description: Type of history entry
          example: "audit_log"

    SearchResult:
      type: object
      description: Clinical data search result
      properties:
        resultType:
          type: string
          enum: [medical_record, clinical_note, lab_result, prescription]
          description: Type of search result
          example: "clinical_note"
        id:
          type: string
          format: uuid
