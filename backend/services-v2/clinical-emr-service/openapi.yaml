        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /metrics:
    get:
      tags:
        - Metrics
      summary: Get service metrics and statistics
      description: |
        Retrieve real-time service metrics and operational statistics.
        
        **Metrics Categories:**
        - Patient and record counts
        - Clinical activity statistics
        - System performance indicators
        - Data freshness and quality metrics
        
        **Features:**
        - Real-time data aggregation
        - Historical trend indicators
        - Service health monitoring
        - Performance benchmarking
        
        **Use Cases:**
        - Operational dashboards and monitoring
        - Executive reporting and KPI tracking
        - Capacity planning and resource allocation
        - Quality improvement measurement
      operationId: getServiceMetrics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Service metrics retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceMetricsResponse'
              examples:
                currentMetrics:
                  summary: "Current service metrics"
                  value:
                    success: true
                    data:
                      totalPatients: 1250
                      totalMedicalRecords: 3420
                      recordsLast30Days: 156
                      recordsLast7Days: 42
                      totalClinicalNotes: 8930
                      notesLast30Days: 312
                      totalLabResults: 15670
                      labsLast30Days: 892
                      pendingLabResults: 23
                      totalPrescriptions: 5430
                      activePrescriptions: 1234
                      prescriptionsLast30Days: 456
                      totalImagingStudies: 2340
                      imagingLast30Days: 78
                      totalTreatmentPlans: 1890
                      activeTreatmentPlans: 567
                      totalAuditLogs: 45670
                      auditLogsLast24h: 234
                      totalIntegrationEvents: 12340
                      failedIntegrationEvents: 5
                      lastMedicalRecordUpdate: "2025-01-12T15:30:00Z"
                      lastClinicalNoteUpdate: "2025-01-12T14:45:00Z"
                      lastAuditLogUpdate: "2025-01-12T15:32:00Z"
                      calculatedAt: "2025-01-12T15:35:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /patients/{patientId}/export:
    get:
      tags:
        - Export
      summary: Export complete patient clinical data
      description: |
        Export all clinical data for a specific patient in structured JSON format.
        
        **Export Contents:**
        - Complete medical record history
        - All clinical notes and documentation
        - Laboratory results and imaging studies
        - Prescriptions and treatment plans
        - Patient demographic information
        - Audit trail and change history
        
        **Features:**
        - Comprehensive data aggregation
        - Structured JSON format for analysis
        - Data integrity validation
        - Export metadata and timestamps
        
        **Use Cases:**
        - Patient data portability and transfer
        - Clinical research and analysis
        - Backup and archival purposes
        - Regulatory compliance reporting
        - Second opinion consultations
      operationId: exportPatientData
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          description: Unique patient identifier
          schema:
            type: string
            pattern: '^PAT-[0-9]{4}-[0-9]{3}$'
            example: "PAT-2025-001"
        - name: format
          in: query
          required: false
          description: Export format
          schema:
            type: string
            enum: [json, xml]
            default: json
            example: json
      responses:
        '200':
          description: Patient data exported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportResponse'
              headers:
                Content-Disposition:
                  description: File download information
                  schema:
                    type: string
                    example: "attachment; filename=\"patient-PAT-2025-001-export-2025-01-12.json\""
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token obtained from the authentication service.
        
        Include the token in the Authorization header:
        ```
        Authorization: Bearer <your-jwt-token>
        ```

  schemas:
    # Core Entities
    MedicalRecord:
      type: object
      description: Medical record entity
      properties:
        id:
          type: string
          format: uuid
          description: Unique medical record identifier
          example: "123e4567-e89b-12d3-a456-426614174000"
        patientId:
          type: string
          description: Patient identifier
          example: "PAT-2025-001"
        doctorId:
          type: string
          description: Doctor/Provider identifier
          example: "DOC-2025-001"
        diagnosis:
          type: object
          description: Primary diagnosis information
          properties:
            code:
              type: string
              description: ICD-10 code
              example: "E11"
            description:
              type: string
              description: Diagnosis description
              example: "Type 2 diabetes mellitus"
            severity:
              type: string
              enum: [mild, moderate, severe]
              example: "moderate"
        chiefComplaint:
          type: string
          description: Chief complaint
          example: "Elevated blood sugar levels"
        historyOfPresentIllness:
          type: string
          description: History of present illness
          example: "Patient presents with 3-month history of elevated blood sugar..."
        physicalExamination:
          type: object
          description: Physical examination findings
        assessment:
          type: string
          description: Clinical assessment
        plan:
          type: string
          description: Treatment plan
        createdAt:
          type: string
          format: date-time
          description: Record creation timestamp
          example: "2025-01-10T09:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2025-01-12T14:15:00Z"

    ClinicalNote:
      type: object
      description: Clinical note entity
      properties:
        id:
          type: string
          format: uuid
          description: Unique note identifier
          example: "456e7890-e89b-12d3-a456-426614174111"
        recordId:
          type: string
          format: uuid
          description: Parent medical record ID
          example: "123e4567-e89b-12d3-a456-426614174000"
        noteType:
          type: string
          enum: [progress_note, soap_note, consultation, discharge_summary]
          description: Type of clinical note
          example: "progress_note"
        title:
          type: string
          description: Note title
          example: "Diabetes Management Follow-up"
        content:
          type: object
          description: Note content
          properties:
            text:
              type: string
              description: Main note content
              example: "Patient presents for follow-up of diabetes management..."
            sections:
              type: array
              items:
                type: object
              description: Structured note sections
        soapFormat:
          type: object
          description: SOAP format structure
          properties:
            subjective:
              type: string
              description: Subjective information
            objective:
              type: string
              description: Objective findings
            assessment:
              type: string
              description: Clinical assessment
            plan:
              type: string
              description: Treatment plan
        encounterId:
          type: string
          description: Associated encounter ID
          example: "ENC-2025-001"
        createdBy:
          type: string
          format: uuid
          description: User who created the note
          example: "789e0123-e89b-12d3-a456-426614174222"
        createdAt:
          type: string
          format: date-time
          description: Note creation timestamp
          example: "2025-01-12T14:15:00Z"

    LabResult:
      type: object
      description: Laboratory result entity
      properties:
        id:
          type: string
          format: uuid
          description: Unique lab result identifier
          example: "567e8901-e89b-12d3-a456-426614174333"
        recordId:
          type: string
          format: uuid
          description: Parent medical record ID
          example: "123e4567-e89b-12d3-a456-426614174000"
        testName:
          type: string
          description: Name of the laboratory test
          example: "Hemoglobin A1c"
        result:
          type: string
          description: Test result value
          example: "7.2%"
        normalRange:
          type: string
          description: Normal reference range
          example: "4.0% - 5.6%"
        status:
          type: string
          enum: [pending, completed, abnormal]
          description: Result status
          example: "abnormal"
        testDate:
          type: string
          format: date
          description: Date the test was performed
          example: "2025-01-11"
        orderedBy:
          type: string
          description: Ordering provider
          example: "Dr. Smith"
        createdAt:
          type: string
          format: date-time
          description: Result entry timestamp
          example: "2025-01-12T10:30:00Z"

    ImagingStudy:
      type: object
      description: Imaging study entity
      properties:
        id:
          type: string
          format: uuid
          description: Unique imaging study identifier
          example: "678e9012-e89b-12d3-a456-426614174444"
        recordId:
          type: string
          format: uuid
          description: Parent medical record ID
          example: "123e4567-e89b-12d3-a456-426614174000"
        modality:
          type: string
          enum: [xray, ct, mri, ultrasound, other]
          description: Imaging modality
          example: "xray"
        bodyRegion:
          type: string
          description: Body region examined
          example: "Chest"
        findings:
          type: string
          description: Radiological findings
          example: "No acute cardiopulmonary abnormality"
        impression:
          type: string
          description: Radiologist impression
          example: "Normal chest examination"
        imageUrls:
          type: array
          items:
            type: string
          description: URLs to imaging files
          example: ["https://storage.hospital.com/images/chest-xray-001.jpg"]
        studyDate:
          type: string
          format: date
          description: Date of the imaging study
          example: "2025-01-10"
        radiologist:
          type: string
          description: Interpreting radiologist
          example: "Dr. Johnson"
        createdAt:
          type: string
          format: date-time
          description: Study entry timestamp
          example: "2025-01-10T16:45:00Z"

    Prescription:
      type: object
      description: Prescription entity
      properties:
        id:
          type: string
          format: uuid
          description: Unique prescription identifier
          example: "789e0123-e89b-12d3-a456-426614174555"
        recordId:
          type: string
          format: uuid
          description: Parent medical record ID
          example: "123e4567-e89b-12d3-a456-426614174000"
        medicationName:
          type: string
          description: Medication name
          example: "Metformin"
        dosage:
          type: string
          description: Medication dosage
          example: "500mg"
        frequency:
          type: string
          description: Dosing frequency
          example: "Twice daily"
        route:
          type: string
          description: Administration route
          example: "Oral"
        startDate:
          type: string
          format: date
          description: Prescription start date
          example: "2025-01-10"
        endDate:
          type: string
          format: date
          description: Prescription end date
          example: "2025-04-10"
        instructions:
          type: string
          description: Special instructions
          example: "Take with meals"
        status:
          type: string
          enum: [active, completed, cancelled]
          description: Prescription status
          example: "active"
        prescribedBy:
          type: string
          description: Prescribing provider
          example: "Dr. Smith"
        createdAt:
          type: string
          format: date-time
          description: Prescription creation timestamp
          example: "2025-01-10T16:45:00Z"

    TreatmentPlan:
      type: object
      description: Treatment plan entity
      properties:
        id:
          type: string
          format: uuid
          description: Unique treatment plan identifier
          example: "890e1234-e89b-12d3-a456-426614174666"
        recordId:
          type: string
          format: uuid
          description: Parent medical record ID
          example: "123e4567-e89b-12d3-a456-426614174000"
        summary:
          type: string
          description: Treatment plan summary
          example: "Diabetes management with lifestyle modifications and medication"
        tasks:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
                example: "Follow-up appointment in 3 months"
              dueDate:
                type: string
                format: date
                example: "2025-04-10"
              status:
                type: string
                enum: [pending, completed, cancelled]
                example: "pending"
          description: Treatment tasks and milestones
        status:
          type: string
          enum: [draft, active, completed]
          description: Treatment plan status
          example: "active"
        createdBy:
          type: string
          description: Creating provider
          example: "Dr. Smith"
        createdAt:
          type: string
          format: date-time
          description: Plan creation timestamp
          example: "2025-01-10T17:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
          example: "2025-01-12T14:30:00Z"

    AuditLog:
      type: object
      description: Audit log entity
      properties:
        id:
          type: string
          format: uuid
          description: Unique audit log identifier
          example: "901e2345-e89b-12d3-a456-426614174777"
        recordId:
          type: string
          format: uuid
          description: Related medical record ID
          example: "123e4567-e89b-12d3-a456-426614174000"
        actorId:
          type: string
          format: uuid
          description: User who performed the action
          example: "789e0123-e89b-12d3-a456-426614174222"
        action:
          type: string
          enum: [CREATE, UPDATE, DELETE, VIEW]
          description: Action performed
          example: "UPDATE"
        metadata:
          type: object
          description: Additional metadata about the action
          properties:
            field:
              type: string
              example: "diagnosis"
            oldValue:
              type: string
              example: "Hypertension"
            newValue:
              type: string
              example: "Type 2 diabetes mellitus"
        createdAt:
          type: string
          format: date-time
          description: Audit log timestamp
          example: "2025-01-12T10:30:00Z"

    # Enhanced Endpoint Schemas
    PatientSummary:
      type: object
      description: Comprehensive patient clinical summary
      properties:
        patientId:
          type: string
          description: Patient unique identifier
          example: "PAT-2025-001"
        primaryMedicalRecordId:
          type: string
