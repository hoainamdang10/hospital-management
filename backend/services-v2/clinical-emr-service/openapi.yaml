        totalLabResults:
          type: integer
          description: Total number of lab results
          example: 12
        activePrescriptions:
          type: integer
          description: Number of active prescriptions
          example: 3
        totalImagingStudies:
          type: integer
          description: Total number of imaging studies
          example: 2
        activeTreatmentPlans:
          type: integer
          description: Number of active treatment plans
          example: 1
        latestNoteDate:
          type: string
          format: date-time
          description: Date of latest clinical note
          example: "2025-01-12T14:15:00Z"
        latestLabDate:
          type: string
          format: date-time
          description: Date of latest lab result
          example: "2025-01-11T10:30:00Z"
        latestPrescriptionDate:
