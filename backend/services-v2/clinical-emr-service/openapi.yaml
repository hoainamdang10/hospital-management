          description: Updated assessment
        plan:
          type: string
          description: Updated treatment plan

    CreateClinicalNoteRequest:
      type: object
      required:
        - noteType
        - title
        - content
      properties:
        noteType:
          type: string
          enum: [progress_note, soap_note, consultation, discharge_summary]
          description: Type of clinical note
          example: "progress_note"
        title:
          type: string
          description: Note title
          example: "Diabetes Management Follow-up"
        content:
          type: object
          description: Note content
          properties:
            text:
              type: string
              description: Main note content
        soapFormat:
          type: object
          description: SOAP format structure
          properties:
            subjective:
              type: string
            objective:
              type: string
            assessment:
              type: string
            plan:
              type: string
        encounterId:
          type: string
          description: Associated encounter ID
          example: "ENC-2025-001"

    CreateLabResultRequest:
      type: object
      required:
        - testName
        - result
        - testDate
      properties:
        testName:
          type: string
          description: Name of the laboratory test
          example: "Hemoglobin A1c"
        result:
          type: string
          description: Test result value
          example: "7.2%"
        normalRange:
          type: string
          description: Normal reference range
          example: "4.0% - 5.6%"
        status:
          type: string
          enum: [pending, completed, abnormal]
          description: Result status
          example: "abnormal"
        testDate:
          type: string
          format: date
          description: Date the test was performed
          example: "2025-01-11"
        orderedBy:
          type: string
          description: Ordering provider
          example: "Dr. Smith"

    CreateImagingStudyRequest:
      type: object
      required:
        - modality
        - bodyRegion
      properties:
        modality:
          type: string
          enum: [xray, ct, mri, ultrasound, other]
          description: Imaging modality
          example: "xray"
        bodyRegion:
          type: string
          description: Body region examined
          example: "Chest"
        findings:
          type: string
          description: Radiological findings
          example: "No acute cardiopulmonary abnormality"
        impression:
          type: string
          description: Radiologist impression
          example: "Normal chest examination"
        imageUrls:
          type: array
          items:
            type: string
          description: URLs to imaging files
        studyDate:
          type: string
          format: date
          description: Date of the imaging study
          example: "2025-01-10"
        radiologist:
          type: string
          description: Interpreting radiologist
          example: "Dr. Johnson"

    CreatePrescriptionRequest:
      type: object
      required:
        - medicationName
        - dosage
        - frequency
        - route
        - startDate
      properties:
        medicationName:
          type: string
          description: Medication name
          example: "Metformin"
        dosage:
          type: string
          description: Medication dosage
          example: "500mg"
        frequency:
          type: string
          description: Dosing frequency
          example: "Twice daily"
        route:
          type: string
          description: Administration route
          example: "Oral"
        startDate:
          type: string
          format: date
          description: Prescription start date
          example: "2025-01-10"
        endDate:
          type: string
          format: date
          description: Prescription end date
          example: "2025-04-10"
        instructions:
          type: string
          description: Special instructions
          example: "Take with meals"

    CreateTreatmentPlanRequest:
      type: object
      required:
        - summary
        - tasks
      properties:
        summary:
          type: string
          description: Treatment plan summary
          example: "Diabetes management with lifestyle modifications"
        tasks:
          type: array
          items:
            type: object
            properties:
              description:
                type: string
                example: "Follow-up appointment in 3 months"
              dueDate:
                type: string
                format: date
                example: "2025-04-10"
              status:
                type: string
                enum: [pending, completed, cancelled]
                example: "pending"
          description: Treatment tasks and milestones

    UpdateTreatmentPlanStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [draft, active, completed]
          description: New treatment plan status
          example: "completed"

    CreateAuditLogRequest:
      type: object
      required:
        - action
        - metadata
      properties:
        action:
          type: string
          enum: [CREATE, UPDATE, DELETE, VIEW]
          description: Action being logged
          example: "UPDATE"
        metadata:
          type: object
          description: Additional metadata about the action
          properties:
            reason:
              type: string
              example: "Updated diagnosis based on new lab results"
            field:
              type: string
              example: "diagnosis"

    # Response Schemas
    MedicalRecordResponse:
