openapi: 3.1.0
info:
  title: Clinical EMR Service API
  description: |
    Clinical EMR (Electronic Medical Record) Service for Hospital Management System
    
    This service provides comprehensive clinical data management including:
    - Medical records and clinical documentation
    - Laboratory results and imaging studies  
    - Prescriptions and treatment plans
    - Patient summaries and clinical history
    - Advanced search and analytics capabilities
    - Data export and audit trails
    
    **Architecture Features:**
    - Clean Architecture with Domain-Driven Design
    - Event-driven communication with Outbox Pattern
    - PostgreSQL database with optimized indexes
    - Real-time metrics and statistics
    - Comprehensive audit logging
  version: 2.0.0
  contact:
    name: Hospital Management System
    email: support@hospital-management.com
    url: https://hospital-management.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3002
    description: Development server
  - url: https://api.hospital-management.com/v2/clinical-emr
    description: Production server

security:
  - BearerAuth: []

tags:
  - name: Medical Records
    description: Core medical record management
  - name: Clinical Notes
    description: Clinical documentation and notes
  - name: Lab Results
    description: Laboratory test results management
  - name: Imaging Studies
    description: Medical imaging and radiology
  - name: Prescriptions
    description: Medication prescriptions
  - name: Treatment Plans
    description: Treatment planning and management
  - name: Audit Logs
    description: Audit trail and change tracking
  - name: Patient Summary
    description: Patient clinical overview and summaries
  - name: Search
    description: Global search across clinical data
  - name: Metrics
    description: Service analytics and statistics
  - name: Export
    description: Data export functionality

paths:
  # Medical Records
  /medical-records:
    get:
      tags:
        - Medical Records
      summary: List medical records
      description: Retrieve paginated list of medical records with filtering options
      operationId: listMedicalRecords
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: patientId
          in: query
          schema:
            type: string
        - name: doctorId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Medical records retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecordsListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Medical Records
      summary: Create medical record
      description: Create a new medical record for a patient
      operationId: createMedicalRecord
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMedicalRecordRequest'
      responses:
        '201':
          description: Medical record created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecordResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}:
    get:
      tags:
        - Medical Records
      summary: Get medical record by ID
      description: Retrieve detailed medical record information
      operationId: getMedicalRecord
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Medical record retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecordResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Medical Records
      summary: Update medical record
      description: Update existing medical record information
      operationId: updateMedicalRecord
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMedicalRecordRequest'
      responses:
        '200':
          description: Medical record updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecordResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Clinical Notes (nested under medical records)
  /medical-records/{recordId}/notes:
    get:
      tags:
        - Clinical Notes
      summary: List clinical notes for medical record
      description: Retrieve all clinical notes associated with a medical record
      operationId: listClinicalNotes
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: noteType
          in: query
          schema:
            type: string
            enum: [progress_note, soap_note, consultation, discharge_summary]
      responses:
        '200':
          description: Clinical notes retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicalNotesListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Clinical Notes
      summary: Create clinical note
      description: Add a new clinical note to a medical record
      operationId: createClinicalNote
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClinicalNoteRequest'
      responses:
        '201':
          description: Clinical note created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClinicalNoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}/notes/{noteId}:
    delete:
      tags:
        - Clinical Notes
      summary: Delete clinical note
      description: Remove a clinical note from a medical record
      operationId: deleteClinicalNote
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: noteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Clinical note deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Lab Results
  /medical-records/{recordId}/lab-results:
    get:
      tags:
        - Lab Results
      summary: List lab results for medical record
      description: Retrieve all laboratory results for a medical record
      operationId: listLabResults
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, completed, abnormal]
      responses:
        '200':
          description: Lab results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabResultsListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Lab Results
      summary: Create lab result
      description: Add new laboratory results to a medical record
      operationId: createLabResult
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLabResultRequest'
      responses:
        '201':
          description: Lab result created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LabResultResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}/lab-results/{resultId}:
    delete:
      tags:
        - Lab Results
      summary: Delete lab result
      description: Remove a laboratory result from a medical record
      operationId: deleteLabResult
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: resultId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Lab result deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Imaging Studies
  /medical-records/{recordId}/imaging-studies:
    get:
      tags:
        - Imaging Studies
      summary: List imaging studies for medical record
      description: Retrieve all imaging studies for a medical record
      operationId: listImagingStudies
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: modality
          in: query
          schema:
            type: string
            enum: [xray, ct, mri, ultrasound, other]
      responses:
        '200':
          description: Imaging studies retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagingStudiesListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Imaging Studies
      summary: Create imaging study
      description: Add new imaging study to a medical record
      operationId: createImagingStudy
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImagingStudyRequest'
      responses:
        '201':
          description: Imaging study created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImagingStudyResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}/imaging-studies/{studyId}:
    delete:
      tags:
        - Imaging Studies
      summary: Delete imaging study
      description: Remove an imaging study from a medical record
      operationId: deleteImagingStudy
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: studyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Imaging study deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Prescriptions
  /medical-records/{recordId}/prescriptions:
    get:
      tags:
        - Prescriptions
      summary: List prescriptions for medical record
      description: Retrieve all prescriptions for a medical record
      operationId: listPrescriptions
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, cancelled]
      responses:
        '200':
          description: Prescriptions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionsListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Prescriptions
      summary: Create prescription
      description: Add new prescription to a medical record
      operationId: createPrescription
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrescriptionRequest'
      responses:
        '201':
          description: Prescription created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}/prescriptions/{prescriptionId}:
    delete:
      tags:
        - Prescriptions
      summary: Delete prescription
      description: Remove a prescription from a medical record
      operationId: deletePrescription
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: prescriptionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Prescription deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Treatment Plans
  /medical-records/{recordId}/treatment-plans:
    get:
      tags:
        - Treatment Plans
      summary: List treatment plans for medical record
      description: Retrieve all treatment plans for a medical record
      operationId: listTreatmentPlans
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, completed]
      responses:
        '200':
          description: Treatment plans retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreatmentPlansListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Treatment Plans
      summary: Create treatment plan
      description: Add new treatment plan to a medical record
      operationId: createTreatmentPlan
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTreatmentPlanRequest'
      responses:
        '201':
          description: Treatment plan created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreatmentPlanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}/treatment-plans/{planId}/status:
    patch:
      tags:
        - Treatment Plans
      summary: Update treatment plan status
      description: Update the status of a treatment plan
      operationId: updateTreatmentPlanStatus
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: planId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTreatmentPlanStatusRequest'
      responses:
        '200':
          description: Treatment plan status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TreatmentPlanResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}/treatment-plans/{planId}:
    delete:
      tags:
        - Treatment Plans
      summary: Delete treatment plan
      description: Remove a treatment plan from a medical record
      operationId: deleteTreatmentPlan
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: planId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Treatment plan deleted successfully
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Audit Logs
  /medical-records/{recordId}/audit-logs:
    get:
      tags:
        - Audit Logs
      summary: List audit logs for medical record
      description: Retrieve audit trail for a medical record
      operationId: listAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: action
          in: query
          schema:
            type: string
            enum: [CREATE, UPDATE, DELETE]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Audit logs retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogsListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - Audit Logs
      summary: Create audit log entry
      description: Add manual audit log entry (admin only)
      operationId: createAuditLog
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuditLogRequest'
      responses:
        '201':
          description: Audit log created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Enhanced Endpoints
  /patients/{patientId}/summary:
    get:
      tags:
        - Patient Summary
      summary: Get comprehensive patient clinical summary
      description: |
        Retrieve a complete overview of patient's clinical data including:
        - Medical records and diagnosis information
        - Clinical notes and documentation
        - Laboratory results and imaging studies
        - Active prescriptions and treatment plans
        - Patient demographic information
        
        **Use Cases:**
        - Quick patient overview for clinical staff
        - Pre-visit patient preparation
        - Clinical decision support
        - Quality reporting and analytics
      operationId: getPatientSummary
      security:
        - BearerAuth: []
      parameters:
        - name: patientId
          in: path
          required: true
          description: Unique patient identifier
          schema:
            type: string
            pattern: '^PAT-[0-9]{4}-[0-9]{3}$'
            example: "PAT-2025-001"
      responses:
        '200':
          description: Patient summary retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientSummaryResponse'
              examples:
                diabetesPatient:
                  summary: "Patient with Type 2 Diabetes"
                  value:
                    success: true
                    data:
                      patientId: "PAT-2025-001"
                      primaryMedicalRecordId: "123e4567-e89b-12d3-a456-426614174000"
                      diagnosis:
                        code: "E11"
                        description: "Type 2 diabetes mellitus"
                        severity: "moderate"
                      firstVisitDate: "2025-01-10T09:30:00Z"
                      totalNotes: 5
                      totalLabResults: 12
                      activePrescriptions: 3
                      totalImagingStudies: 2
                      activeTreatmentPlans: 1
                      latestNoteDate: "2025-01-12T14:15:00Z"
                      fullName: "Nguyen Van A"
                      dateOfBirth: "1980-05-15"
                      gender: "male"
                      phone: "+84-901-234-567"
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /medical-records/{recordId}/history:
    get:
      tags:
        - Patient Summary
      summary: Get medical record change history
      description: |
        Retrieve complete audit trail and version history for a specific medical record.
        
        **Features:**
        - Complete audit trail with timestamps
        - Version history for major changes
        - Actor identification and change metadata
        - Chronological ordering of events
        
        **Use Cases:**
        - Compliance and regulatory requirements
        - Clinical investigation and root cause analysis
        - Data integrity verification
        - Legal and medical record disputes
      operationId: getMedicalRecordHistory
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          description: Unique medical record identifier
          schema:
            type: string
            format: uuid
            example: "123e4567-e89b-12d3-a456-426614174000"
      responses:
        '200':
          description: Medical record history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MedicalRecordHistoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /search:
    get:
      tags:
        - Search
      summary: Search across clinical data
      description: |
        Global search functionality across all clinical data types with relevance scoring.
        
        **Search Scope:**
        - Medical records (diagnosis, chief complaint)
        - Clinical notes (content, titles)
        - Laboratory results (test names, abnormal findings)
        - Prescriptions (medication names, indications)
        
        **Features:**
        - Full-text search with fuzzy matching
        - Relevance scoring for result ranking
        - Configurable result limits
        - Multi-type result aggregation
        
        **Use Cases:**
        - Clinical research and cohort identification
        - Quality improvement initiatives
        - Patient safety monitoring
        - Rapid clinical information retrieval
      operationId: searchClinicalData
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          description: Search term (minimum 2 characters)
          schema:
            type: string
            minLength: 2
            maxLength: 100
            example: "diabetes"
        - name: limit
          in: query
          required: false
          description: Maximum number of results to return
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            example: 25
      responses:
        '200':
          description: Search results retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
              examples:
                diabetesSearch:
                  summary: "Search results for 'diabetes'"
                  value:
                    success: true
                    data:
                      - resultType: "clinical_note"
                        id: "123e4567-e89b-12d3-a456-426614174000"
                        patientId: "PAT-2025-001"
                        title: "Progress Note - Diabetes Management"
                        content:
                          text: "Patient presents with elevated blood sugar levels..."
                          type: "progress_note"
                        createdAt: "2025-01-12T14:15:00Z"
                        relevanceScore: 0.95
                      - resultType: "prescription"
                        id: "456e7890-e89b-12d3-a456-426614174111"
                        patientId: "PAT-2025-002"
