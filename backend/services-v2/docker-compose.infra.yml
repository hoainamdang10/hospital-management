# Hospital Management System - Infrastructure Only
# Run only Redis and RabbitMQ for local development
# Usage: docker-compose -f docker-compose.infra.yml up -d

version: "3.8"

networks:
  hospital-v2-network:
    driver: bridge

volumes:
  redis-v2-data:
  rabbitmq-v2-data:

services:
  # Redis - Caching and Rate Limiting
  redis-v2:
    image: redis:7-alpine
    container_name: hospital-redis-v2
    ports:
      - "6379:6379"
    volumes:
      - redis-v2-data:/data
    command: redis-server --appendonly yes
    networks:
      - hospital-v2-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # RabbitMQ - Message Queue
  rabbitmq-v2:
    image: rabbitmq:3-management-alpine
    container_name: hospital-rabbitmq-v2
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-v2-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - hospital-v2-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
