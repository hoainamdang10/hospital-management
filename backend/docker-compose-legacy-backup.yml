services:
  # GraphQL Gateway - Unified GraphQL API over REST microservices
  # PERFORMANCE OPTIMIZED: Direct microservice access to eliminate double hop
  graphql-gateway:
    build:
      context: .
      dockerfile: ./services/graphql-gateway/Dockerfile
    ports:
      - "3200:3200"
    environment:
      - NODE_ENV=development
      - PORT=3200
      # OPTIMIZATION: Direct microservice URLs for better performance
      - API_GATEWAY_URL=http://api-gateway:3100
      - AUTH_SERVICE_URL=http://auth-service:3001
      - DOCTOR_SERVICE_URL=http://doctor-service:3002
      - PATIENT_SERVICE_URL=http://patient-service:3003
      - APPOINTMENT_SERVICE_URL=http://appointment-service:3004
      # REMOVED: DEPARTMENT_SERVICE_URL - migrated to auth-service (Phase 1)
      - RECEPTIONIST_SERVICE_URL=http://receptionist-service:3006
      - MEDICAL_RECORDS_SERVICE_URL=http://medical-records-service:3007
      # REMOVED: PRESCRIPTION_SERVICE_URL - merged into medical-records-service

      - PAYMENT_SERVICE_URL=http://payment-service:3009
      - NOTIFICATION_SERVICE_URL=http://notification-service:3011
      - FILE_SERVICE_URL=http://file-service:3107
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost:3000,http://localhost:3100
      - DEFAULT_LANGUAGE=vi
      - TIMEZONE=Asia/Ho_Chi_Minh
      # PERFORMANCE: Enable optimizations
      - ENABLE_CACHING=true
      - ENABLE_COMPRESSION=true
      - ENABLE_HTTP2=true
      - MAX_QUERY_COMPLEXITY=1000
      - DATALOADER_BATCH_SIZE=100
    depends_on:
      - redis
      - rabbitmq
    networks:
      - hospital-network
    # OPTIMIZED: Resource limits for better performance
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M
          cpus: "0.5"
      # AUTO-SCALING: Replicas for load balancing
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    restart: unless-stopped
    profiles:
      - core
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=development
      - PORT=3100
      - AUTH_SERVICE_URL=http://auth-service:3001
      - DOCTOR_SERVICE_URL=http://doctor-service:3002
      - PATIENT_SERVICE_URL=http://patient-service:3003
      - APPOINTMENT_SERVICE_URL=http://appointment-service:3004
      # REMOVED: DEPARTMENT_SERVICE_URL - migrated to auth-service (Phase 1)
      - RECEPTIONIST_SERVICE_URL=http://receptionist-service:3006
      - MEDICAL_RECORDS_SERVICE_URL=http://medical-records-service:3007
      # REMOVED: PRESCRIPTION_SERVICE_URL - merged into medical-records-service
      - PAYMENT_SERVICE_URL=http://payment-service:3009
      - NOTIFICATION_SERVICE_URL=http://notification-service:3011
      - FILE_SERVICE_URL=http://file-service:3107
      - GRAPHQL_GATEWAY_URL=http://graphql-gateway:3200
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - redis
      - rabbitmq
    networks:
      - hospital-network
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    profiles:
      - core
      - full

  # Auth Service - Using Supabase Auth
  auth-service:
    build:
      context: .
      dockerfile: ./services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./services/auth-service/.env
    environment:
      - NODE_ENV=development
      - PORT=3001
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      # Phase 3A: Admin Orchestrator Integration
      - API_GATEWAY_URL=http://api-gateway:3100
      - SERVICE_AUTH_TOKEN=${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      - redis
      - rabbitmq
    networks:
      - hospital-network
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
          cpus: "0.25"
    profiles:
      - core
      - full
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

