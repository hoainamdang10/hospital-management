# Hospital Management System V2 - Clean Architecture Only
# This docker-compose file contains only V2 services and essential infrastructure
version: '3.8'

networks:
  hospital-v2-network:
    driver: bridge

volumes:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

services:
  # Infrastructure Services
  redis:
    image: redis:7-alpine
    container_name: hospital-redis-v2
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - hospital-v2-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - infrastructure
      - core
      - full

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: hospital-rabbitmq-v2
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - hospital-v2-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - infrastructure
      - core
      - full

  # API Gateway - Updated to route to V2 services
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    container_name: hospital-api-gateway-v2
    ports:
      - "3100:3100"
    environment:
      - NODE_ENV=development
      - PORT=3100
      # V2 Service URLs
      - IDENTITY_SERVICE_URL=http://localhost:3021
      - PATIENT_SERVICE_URL=http://localhost:3023
      - PROVIDER_SERVICE_URL=http://localhost:3022
      - SCHEDULING_SERVICE_URL=http://localhost:3024
      - CLINICAL_SERVICE_URL=http://localhost:3027
      - BILLING_SERVICE_URL=http://localhost:3029
      - NOTIFICATIONS_SERVICE_URL=http://localhost:3031
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost:3000,http://localhost:3100
    depends_on:
      - redis
      - rabbitmq
    networks:
      - hospital-v2-network
    profiles:
      - core
      - full

  # GraphQL Gateway - Updated to route to V2 services  
  graphql-gateway:
    build:
      context: .
      dockerfile: ./services/graphql-gateway/Dockerfile
    container_name: hospital-graphql-gateway-v2
    ports:
      - "3200:3200"
    environment:
      - NODE_ENV=development
      - PORT=3200
      # V2 Service URLs
      - API_GATEWAY_URL=http://api-gateway:3100
      - IDENTITY_SERVICE_URL=http://localhost:3021
      - PATIENT_SERVICE_URL=http://localhost:3023
      - PROVIDER_SERVICE_URL=http://localhost:3022
      - SCHEDULING_SERVICE_URL=http://localhost:3024
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
      - rabbitmq
      - api-gateway
    networks:
      - hospital-v2-network
    profiles:
      - core
      - full

  # Monitoring Services
  prometheus:
    image: prom/prometheus:latest
    container_name: hospital-prometheus-v2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - hospital-v2-network
    profiles:
      - monitoring
      - full

  grafana:
    image: grafana/grafana:latest
    container_name: hospital-grafana-v2
    ports:
      - "3010:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - hospital-v2-network
    profiles:
      - monitoring
      - full

  node-exporter:
    image: prom/node-exporter:latest
    container_name: hospital-node-exporter-v2
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - hospital-v2-network
    profiles:
      - monitoring
      - full
