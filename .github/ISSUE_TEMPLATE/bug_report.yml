name: 🐛 Bug Report
description: Report a bug in the Hospital Management System
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees:
  - Kutou01

body:
  - type: markdown
    attributes:
      value: |
        ## 🏥 Hospital Management System Bug Report
        
        Thank you for taking the time to report a bug. Please fill out this form completely to help us resolve the issue quickly.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Frontend (Next.js)
        - API Gateway
        - GraphQL Gateway
        - Auth Service
        - Doctor Service
        - Patient Service
        - Appointment Service
        - Medical Records Service
        - Payment Service
        - Notification Service
        - Department Service
        - Receptionist Service
        - Database/Supabase
        - Docker/Infrastructure
        - CI/CD Pipeline
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (System down, data loss, security issue)
        - High (Major functionality broken)
        - Medium (Feature partially working)
        - Low (Minor issue, cosmetic)
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where did this bug occur?
      options:
        - Development
        - Staging
        - Production
        - Local Development
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Logs
      description: If applicable, add screenshots or error logs to help explain your problem
      placeholder: Paste screenshots or logs here...

  - type: input
    id: browser
    attributes:
      label: Browser (if frontend issue)
      description: Which browser are you using?
      placeholder: e.g., Chrome 120, Firefox 121, Safari 17

  - type: input
    id: device
    attributes:
      label: Device (if frontend issue)
      description: What device are you using?
      placeholder: e.g., Desktop, iPhone 15, Samsung Galaxy S23

  - type: dropdown
    id: user_role
    attributes:
      label: User Role
      description: What role were you using when the bug occurred?
      options:
        - Admin
        - Doctor
        - Patient
        - Receptionist
        - Not logged in
        - Other

  - type: checkboxes
    id: hipaa_impact
    attributes:
      label: HIPAA/Privacy Impact
      description: Does this bug potentially affect patient privacy or HIPAA compliance?
      options:
        - label: This bug may expose patient data
        - label: This bug affects audit logging
        - label: This bug affects access controls
        - label: No privacy impact

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here
      placeholder: Any additional information that might be helpful...

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided all the required information
          required: true
        - label: I understand this is a healthcare system and patient privacy is critical
          required: true
