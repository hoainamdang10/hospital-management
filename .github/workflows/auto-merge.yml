name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check PR details
        id: pr-check
        run: |
          echo "Checking Dependabot PR..."
          
          # Get PR title and check if it's a minor/patch update
          PR_TITLE="${{ github.event.pull_request.title }}"
          
          if [[ "$PR_TITLE" =~ "Bump.*from.*to" ]]; then
            echo "is_dependency_update=true" >> $GITHUB_OUTPUT
            
            # Check if it's a major version update
            if [[ "$PR_TITLE" =~ "from [0-9]+\.[0-9]+\.[0-9]+ to [0-9]*[0-9]+\.[0-9]+\.[0-9]+" ]]; then
              # Extract versions and check if major version changed
              echo "version_type=minor_or_patch" >> $GITHUB_OUTPUT
            else
              echo "version_type=major" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_dependency_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait for CI checks
        if: steps.pr-check.outputs.is_dependency_update == 'true' && steps.pr-check.outputs.version_type == 'minor_or_patch'
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-name: 'Hospital Management CI/CD Pipeline'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Auto-approve and merge
        if: steps.pr-check.outputs.is_dependency_update == 'true' && steps.pr-check.outputs.version_type == 'minor_or_patch'
        uses: actions/github-script@v7
        with:
          script: |
            // Auto-approve the PR
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: '✅ Auto-approved by GitHub Actions for minor/patch dependency update'
            });
            
            // Enable auto-merge
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              commit_title: 'Auto-merge dependabot PR',
              merge_method: 'squash'
            });

      - name: Comment on major updates
        if: steps.pr-check.outputs.is_dependency_update == 'true' && steps.pr-check.outputs.version_type == 'major'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '⚠️ This is a major version update. Please review manually before merging.'
            });
