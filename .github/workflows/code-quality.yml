name: Code Quality & Standards

on:
  push:
    branches: [ main, develop, thien ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # Job 1: ESLint & Prettier Check
  lint-and-format:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: ['frontend', 'backend']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.workspace }}
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
            npm run lint -- --format=json --output-file=eslint-results.json || true
            npm run lint
          else
            echo "ESLint configuration not found, skipping..."
          fi

      - name: Run Prettier Check
        working-directory: ${{ matrix.workspace }}
        run: |
          if [ -f ".prettierrc" ] || [ -f "prettier.config.js" ]; then
            npx prettier --check "**/*.{js,ts,tsx,json,md}" || true
          else
            echo "Prettier configuration not found, skipping..."
          fi

      - name: Upload ESLint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-results-${{ matrix.workspace }}
          path: ${{ matrix.workspace }}/eslint-results.json
          retention-days: 7

  # Job 2: TypeScript Type Checking
  typescript-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: ['frontend', 'backend']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ matrix.workspace }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: TypeScript compilation check
        working-directory: ${{ matrix.workspace }}
        run: |
          if [ -f "tsconfig.json" ]; then
            npx tsc --noEmit --pretty
          else
            echo "TypeScript configuration not found, skipping..."
          fi

      - name: TypeScript strict mode check
        working-directory: ${{ matrix.workspace }}
        run: |
          if [ -f "tsconfig.json" ]; then
            echo "Checking TypeScript strict mode compliance..."
            npx tsc --noEmit --strict --pretty || echo "Strict mode violations found"
          fi

  # Job 3: Service-specific Quality Checks
  service-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          'api-gateway',
          'auth-service',
          'doctor-service',
          'patient-service',
          'appointment-service',
          'medical-records-service'
        ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/services/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        working-directory: backend/services/${{ matrix.service }}
        run: npm ci

      - name: Run service-specific linting
        working-directory: backend/services/${{ matrix.service }}
        run: |
          if npm run lint --if-present; then
            echo "✅ Linting passed for ${{ matrix.service }}"
          else
            echo "⚠️ Linting issues found in ${{ matrix.service }}"
          fi

      - name: Check API documentation
        working-directory: backend/services/${{ matrix.service }}
        run: |
          echo "Checking API documentation for ${{ matrix.service }}..."
          if [ -f "README.md" ]; then
            if grep -q "API" README.md; then
              echo "✅ API documentation found"
            else
              echo "⚠️ API documentation missing"
            fi
          else
            echo "⚠️ README.md not found"
          fi

      - name: Check environment variables documentation
        working-directory: backend/services/${{ matrix.service }}
        run: |
          if [ -f ".env.example" ] || [ -f ".env.template" ]; then
            echo "✅ Environment variables documented"
          else
            echo "⚠️ Environment variables documentation missing"
          fi

  # Job 4: Code Complexity Analysis
  complexity-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install complexity analysis tools
        run: |
          npm install -g complexity-report
          npm install -g jscpd

      - name: Run complexity analysis
        run: |
          echo "🔍 Code Complexity Analysis"
          
          # Analyze frontend complexity
          if [ -d "frontend/src" ]; then
            echo "Frontend complexity:"
            cr frontend/src --format json > frontend-complexity.json || true
          fi
          
          # Analyze backend services complexity
          for service in backend/services/*/src; do
            if [ -d "$service" ]; then
              service_name=$(basename $(dirname $service))
              echo "Analyzing $service_name complexity:"
              cr "$service" --format json > "${service_name}-complexity.json" || true
            fi
          done

      - name: Check code duplication
        run: |
          echo "🔍 Code Duplication Analysis"
          jscpd frontend/src backend/services/*/src --reporters json --output duplication-report.json || true

      - name: Upload complexity reports
        uses: actions/upload-artifact@v4
        with:
          name: complexity-reports
          path: |
            *-complexity.json
            duplication-report.json
          retention-days: 30

  # Job 5: Documentation Quality
  documentation-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README files
        run: |
          echo "📚 Documentation Quality Check"
          
          # Check main README
          if [ -f "README.md" ]; then
            echo "✅ Main README.md exists"
            if grep -q "Installation\|Setup\|Getting Started" README.md; then
              echo "✅ Installation instructions found"
            else
              echo "⚠️ Installation instructions missing"
            fi
          else
            echo "❌ Main README.md missing"
          fi
          
          # Check service READMEs
          for service_dir in backend/services/*/; do
            service_name=$(basename "$service_dir")
            if [ -f "${service_dir}README.md" ]; then
              echo "✅ $service_name has README"
            else
              echo "⚠️ $service_name missing README"
            fi
          done

      - name: Check API documentation
        run: |
          echo "🔍 API Documentation Check"
          
          # Look for OpenAPI/Swagger specs
          find . -name "*.yaml" -o -name "*.yml" -o -name "swagger.json" | while read file; do
            if grep -q "openapi\|swagger" "$file"; then
              echo "✅ API spec found: $file"
            fi
          done
          
          # Check for API documentation in code
          if find . -name "*.ts" -o -name "*.js" | xargs grep -l "@api\|@swagger\|@openapi"; then
            echo "✅ API documentation annotations found"
          else
            echo "⚠️ API documentation annotations missing"
          fi

  # Job 6: Performance Linting
  performance-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install performance analysis tools
        run: npm install -g bundlesize

      - name: Check bundle size (Frontend)
        working-directory: frontend
        run: |
          if [ -f "package.json" ] && npm ci; then
            npm run build
            if [ -f "bundlesize.config.json" ]; then
              bundlesize
            else
              echo "Bundle size configuration not found"
            fi
          fi

      - name: Database query analysis
        run: |
          echo "🔍 Database Query Performance Check"
          
          # Look for potential N+1 queries
          if find . -name "*.ts" -o -name "*.js" | xargs grep -n "\.map.*await\|for.*await.*query"; then
            echo "⚠️ Potential N+1 query patterns found"
          fi
          
          # Check for missing indexes hints
          if find . -name "*.ts" -o -name "*.js" | xargs grep -l "WHERE\|JOIN" | xargs grep -L "index\|Index"; then
            echo "⚠️ Queries without index considerations found"
          fi

  # Job 7: Quality Gate Summary
  quality-gate:
    runs-on: ubuntu-latest
    needs: [lint-and-format, typescript-check, service-quality, complexity-analysis, documentation-check, performance-check]
    if: always()
    steps:
      - name: Quality Gate Summary
        run: |
          echo "## 📊 Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Format | ${{ needs.lint-and-format.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ needs.typescript-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Service Quality | ${{ needs.service-quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Complexity Analysis | ${{ needs.complexity-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.documentation-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ needs.performance-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏥 Healthcare Code Standards" >> $GITHUB_STEP_SUMMARY
          echo "- All patient data handling must be documented" >> $GITHUB_STEP_SUMMARY
          echo "- Error handling is mandatory for all API endpoints" >> $GITHUB_STEP_SUMMARY
          echo "- Input validation required for all user inputs" >> $GITHUB_STEP_SUMMARY
          echo "- Audit logging must be implemented for data changes" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical issues
        if: needs.lint-and-format.result == 'failure' || needs.typescript-check.result == 'failure'
        run: |
          echo "❌ Critical quality issues found"
          exit 1
