name: Deployment Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production
      rollback_version:
        description: 'Version to rollback to (optional)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Pre-deployment Checks
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine-env.outputs.environment }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine deployment environment
        id: determine-env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=development" >> $GITHUB_OUTPUT
          fi

      - name: Generate version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ github.ref_name }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Validate deployment readiness
        run: |
          echo "🚀 Deployment Readiness Check"
          echo "Environment: ${{ steps.determine-env.outputs.environment }}"
          echo "Version: ${{ steps.version.outputs.version }}"
          
          # Check if required secrets are available
          if [ "${{ steps.determine-env.outputs.environment }}" = "production" ]; then
            if [ -z "${{ secrets.PROD_SUPABASE_URL }}" ]; then
              echo "❌ Production Supabase URL not configured"
              exit 1
            fi
          fi

  # Job 2: Database Migration
  database-migration:
    runs-on: ubuntu-latest
    needs: pre-deployment
    if: needs.pre-deployment.outputs.environment != 'development'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run database migrations
        run: |
          echo "🗄️ Running database migrations for ${{ needs.pre-deployment.outputs.environment }}"
          
          # Set environment-specific variables
          if [ "${{ needs.pre-deployment.outputs.environment }}" = "production" ]; then
            export SUPABASE_URL="${{ secrets.PROD_SUPABASE_URL }}"
            export SUPABASE_SERVICE_ROLE_KEY="${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}"
          else
            export SUPABASE_URL="${{ secrets.STAGING_SUPABASE_URL }}"
            export SUPABASE_SERVICE_ROLE_KEY="${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}"
          fi
          
          # Run migrations (placeholder - adjust based on your migration system)
          echo "Migrations would run here"

  # Job 3: Deploy to Development
  deploy-development:
    runs-on: ubuntu-latest
    needs: pre-deployment
    if: needs.pre-deployment.outputs.environment == 'development'
    environment: development
    steps:
      - name: Deploy to Development
        run: |
          echo "🚀 Deploying to Development Environment"
          echo "Version: ${{ needs.pre-deployment.outputs.version }}"
          
          # Development deployment logic
          echo "Development deployment completed"

  # Job 4: Deploy to Staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [pre-deployment, database-migration]
    if: needs.pre-deployment.outputs.environment == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "🚀 Deploying to Staging Environment"
          echo "Version: ${{ needs.pre-deployment.outputs.version }}"
          
          # Create deployment manifest
          cat > deployment-manifest.yml << EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: hospital-config-staging
          data:
            ENVIRONMENT: "staging"
            VERSION: "${{ needs.pre-deployment.outputs.version }}"
            SUPABASE_URL: "${{ secrets.STAGING_SUPABASE_URL }}"
            API_GATEWAY_URL: "https://staging-api.hospital.com"
            FRONTEND_URL: "https://staging.hospital.com"
          EOF
          
          echo "Staging deployment manifest created"

      - name: Health check
        run: |
          echo "🏥 Running health checks..."
          
          # Wait for services to be ready
          sleep 30
          
          # Check API Gateway
          echo "Checking API Gateway health..."
          # curl -f https://staging-api.hospital.com/health || exit 1
          
          # Check GraphQL Gateway
          echo "Checking GraphQL Gateway health..."
          # curl -f https://staging-graphql.hospital.com/health || exit 1
          
          echo "✅ Health checks passed"

  # Job 5: Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [pre-deployment, database-migration]
    if: needs.pre-deployment.outputs.environment == 'production'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Production deployment approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ github.actor }}
          minimum-approvals: 1
          issue-title: "Production Deployment Approval Required"
          issue-body: |
            Please review and approve the production deployment:
            - Version: ${{ needs.pre-deployment.outputs.version }}
            - Environment: Production
            - Commit: ${{ github.sha }}

      - name: Deploy to Production
        run: |
          echo "🚀 Deploying to Production Environment"
          echo "Version: ${{ needs.pre-deployment.outputs.version }}"
          
          # Blue-Green deployment strategy
          echo "Starting blue-green deployment..."
          
          # Create production deployment manifest
          cat > production-manifest.yml << EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: hospital-config-production
          data:
            ENVIRONMENT: "production"
            VERSION: "${{ needs.pre-deployment.outputs.version }}"
            SUPABASE_URL: "${{ secrets.PROD_SUPABASE_URL }}"
            API_GATEWAY_URL: "https://api.hospital.com"
            FRONTEND_URL: "https://hospital.com"
            HIPAA_COMPLIANCE: "enabled"
            AUDIT_LOGGING: "enabled"
          EOF
          
          echo "Production deployment completed"

      - name: Production health check
        run: |
          echo "🏥 Running comprehensive production health checks..."
          
          # Wait for services to be ready
          sleep 60
          
          # Check all critical services
          services=("api-gateway" "auth-service" "doctor-service" "patient-service" "appointment-service")
          
          for service in "${services[@]}"; do
            echo "Checking $service health..."
            # curl -f "https://api.hospital.com/$service/health" || exit 1
          done
          
          # Check database connectivity
          echo "Checking database connectivity..."
          
          # Check HIPAA compliance endpoints
          echo "Verifying HIPAA compliance..."
          
          echo "✅ All production health checks passed"

  # Job 6: Rollback (if needed)
  rollback:
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback_version != ''
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Rollback deployment
        run: |
          echo "🔄 Rolling back to version: ${{ github.event.inputs.rollback_version }}"
          echo "Environment: ${{ github.event.inputs.environment }}"
          
          # Rollback logic
          echo "Rollback completed"

  # Job 7: Post-deployment
  post-deployment:
    runs-on: ubuntu-latest
    needs: [deploy-development, deploy-staging, deploy-production]
    if: always() && (needs.deploy-development.result == 'success' || needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Update deployment status
        run: |
          echo "📊 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Development | ${{ needs.deploy-development.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging | ${{ needs.deploy-staging.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Production | ${{ needs.deploy-production.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify deployment
        run: |
          echo "🔔 Sending deployment notifications..."
          
          # Send notifications to team
          # This could integrate with Slack, Teams, or email
          echo "Deployment notifications sent"

      - name: Update monitoring
        run: |
          echo "📈 Updating monitoring and alerting..."
          
          # Update monitoring dashboards
          # Set up alerts for new deployment
          echo "Monitoring updated"

  # Job 8: Smoke Tests
  smoke-tests:
    runs-on: ubuntu-latest
    needs: [deploy-development, deploy-staging, deploy-production]
    if: always() && (needs.deploy-development.result == 'success' || needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Run smoke tests
        run: |
          echo "🧪 Running post-deployment smoke tests..."
          
          # Test critical user journeys
          echo "Testing patient registration flow..."
          echo "Testing doctor appointment booking..."
          echo "Testing medical records access..."
          echo "Testing payment processing..."
          
          # Test API endpoints
          echo "Testing API endpoints..."
          
          # Test authentication
          echo "Testing authentication flows..."
          
          echo "✅ Smoke tests completed successfully"
