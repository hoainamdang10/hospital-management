name: Docker Build & Push

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Detect Docker Changes
  detect-docker-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            services:
              - 'backend/services/**/Dockerfile'
              - 'backend/services/**/src/**'
              - 'backend/services/**/package*.json'
            frontend:
              - 'frontend/Dockerfile'
              - 'frontend/**'

  # Job 2: Build Service Images
  build-services:
    runs-on: ubuntu-latest
    needs: detect-docker-changes
    if: needs.detect-docker-changes.outputs.services == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        service:
          [
            "api-gateway",
            "graphql-gateway",
            "auth-service",
            "doctor-service",
            "patient-service",
            "appointment-service",
            "department-service",
            "medical-records-service",
            "payment-service",
            "notification-service",
            "receptionist-service",
          ]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Check if Dockerfile exists
        id: dockerfile-check
        run: |
          if [ -f "backend/services/${{ matrix.service }}/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        if: steps.dockerfile-check.outputs.exists == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/services/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # Job 3: Build Frontend Image
  build-frontend:
    runs-on: ubuntu-latest
    needs: detect-docker-changes
    if: needs.detect-docker-changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # Job 4: Build Complete Stack
  build-stack:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build complete stack with docker-compose
        run: |
          # Create production docker-compose override
          cat > docker-compose.prod.yml << EOF
          services:
            api-gateway:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.ref_name }}-${{ github.sha }}
            graphql-gateway:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/graphql-gateway:${{ github.ref_name }}-${{ github.sha }}
            auth-service:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-service:${{ github.ref_name }}-${{ github.sha }}
            doctor-service:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/doctor-service:${{ github.ref_name }}-${{ github.sha }}
            patient-service:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/patient-service:${{ github.ref_name }}-${{ github.sha }}
          EOF

      - name: Test stack startup
        working-directory: ./backend
        run: |
          docker-compose -f docker-compose.yml -f ../docker-compose.prod.yml config > stack-config.yml
          echo "Stack configuration validated successfully"

      - name: Upload stack configuration
        uses: actions/upload-artifact@v4
        with:
          name: docker-stack-config
          path: backend/stack-config.yml
          retention-days: 30

  # Job 5: Security Scan Images
  scan-images:
    runs-on: ubuntu-latest
    needs: [build-services, build-frontend]
    if: always() && (needs.build-services.result == 'success' || needs.build-frontend.result == 'success')
    strategy:
      matrix:
        image: ["api-gateway", "doctor-service", "patient-service", "frontend"]
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.image }}:${{ github.ref_name }}-${{ github.sha }}"
          format: "sarif"
          output: "trivy-${{ matrix.image }}.sarif"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.image }}.sarif"

  # Job 6: Cleanup old images
  cleanup:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build-services, build-frontend]
    steps:
      - name: Delete old container images
        uses: actions/delete-package-versions@v5
        with:
          package-name: "${{ env.IMAGE_NAME }}/api-gateway"
          package-type: "container"
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
