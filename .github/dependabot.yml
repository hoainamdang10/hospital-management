version: 2
updates:
  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Kutou01"
    assignees:
      - "Kutou01"
    commit-message:
      prefix: "frontend"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"
    ignore:
      # Ignore major version updates for critical packages
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@supabase/supabase-js"
        update-types: ["version-update:semver-major"]

  # Backend dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
    open-pull-requests-limit: 5
    reviewers:
      - "Kutou01"
    assignees:
      - "Kutou01"
    commit-message:
      prefix: "backend"
      include: "scope"
    labels:
      - "dependencies"
      - "backend"

  # API Gateway service
  - package-ecosystem: "npm"
    directory: "/backend/services/api-gateway"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "api-gateway"

  # GraphQL Gateway service
  - package-ecosystem: "npm"
    directory: "/backend/services/graphql-gateway"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:15"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "graphql-gateway"

  # Auth service
  - package-ecosystem: "npm"
    directory: "/backend/services/auth-service"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "06:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "auth-service"
    ignore:
      # Security-critical packages should be updated manually
      - dependency-name: "jsonwebtoken"
        update-types: ["version-update:semver-major"]
      - dependency-name: "bcryptjs"
        update-types: ["version-update:semver-major"]

  # Doctor service
  - package-ecosystem: "npm"
    directory: "/backend/services/doctor-service"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "doctor-service"

  # Patient service
  - package-ecosystem: "npm"
    directory: "/backend/services/patient-service"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:15"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "patient-service"

  # Appointment service
  - package-ecosystem: "npm"
    directory: "/backend/services/appointment-service"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "appointment-service"

  # Medical Records service
  - package-ecosystem: "npm"
    directory: "/backend/services/medical-records-service"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "medical-records-service"

  # Payment service
  - package-ecosystem: "npm"
    directory: "/backend/services/payment-service"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:15"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "payment-service"
    ignore:
      # Payment-related packages need manual review
      - dependency-name: "*payos*"
        update-types: ["version-update:semver-major"]

  # Notification service
  - package-ecosystem: "npm"
    directory: "/backend/services/notification-service"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:30"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "notification-service"

  # Department service
  - package-ecosystem: "npm"
    directory: "/backend/services/department-service"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "department-service"

  # Receptionist service
  - package-ecosystem: "npm"
    directory: "/backend/services/receptionist-service"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "06:15"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "receptionist-service"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "Kutou01"
    assignees:
      - "Kutou01"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci/cd"

  # Docker
  - package-ecosystem: "docker"
    directory: "/backend/services/api-gateway"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
